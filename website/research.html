<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <title>Research Archive — Ra Intelligence</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --bg-secondary: #161822;
      --bg-tertiary: #1c1f2e;
      --text-primary: #f0ece4;
      --text-secondary: rgba(240, 236, 228, 0.72);
      --text-tertiary: rgba(240, 236, 228, 0.50);
      --text-muted: rgba(240, 236, 228, 0.32);
      --border-color: rgba(240, 236, 228, 0.08);
      --border-color-hover: rgba(240, 236, 228, 0.14);
      --accent: #d4a853;
      --accent-light: #e8b877;
      --accent-bg: rgba(212, 168, 83, 0.08);
      --success: #6dd49c;
      --warning: #e8c96a;
      --error: #e07060;
      --purple: #b49af0;
      --cyan: #7ec4e0;
      --font-body: 'Plus Jakarta Sans', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
      --shadow-sm: 0 2px 4px rgba(0, 0, 0, 0.16);
      --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.24);
      --radius: 12px;
      --radius-sm: 8px;
    }

    html[data-theme="light"] {
      --bg: #faf9f6;
      --bg-secondary: #f0ede6;
      --bg-tertiary: #e8e4dc;
      --text-primary: #1a1a2e;
      --text-secondary: rgba(26, 26, 46, 0.72);
      --text-tertiary: rgba(26, 26, 46, 0.50);
      --text-muted: rgba(26, 26, 46, 0.32);
      --border-color: rgba(26, 26, 46, 0.08);
      --border-color-hover: rgba(26, 26, 46, 0.14);
      --accent: #2d3560;
      --accent-light: #3a4575;
      --accent-bg: rgba(45, 53, 96, 0.08);
      --success: #2d5a42; --warning: #8b6d3f; --error: #7d3a2a;
      --purple: #6b5b95; --cyan: #3a6b8f;
      --shadow-sm: 0 2px 4px rgba(0, 0, 0, 0.08);
      --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.12);
    }

    html, body {
      height: 100%; overflow: hidden;
      background: var(--bg);
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: 14px; line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ═══ SPLIT LAYOUT ═══ */
    .app {
      display: flex;
      height: 100vh;
      flex-direction: column;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 20px;
      border-bottom: 1px solid var(--border-color);
      background: var(--bg-secondary);
      flex-shrink: 0;
    }

    .top-bar h1 { font-size: 18px; font-weight: 700; }
    .top-bar-right { display: flex; align-items: center; gap: 10px; }

    .top-btn {
      background: var(--bg-tertiary); border: 1px solid var(--border-color);
      border-radius: var(--radius-sm); padding: 6px 12px; cursor: pointer;
      color: var(--text-secondary); font-size: 13px; text-decoration: none;
      transition: all 0.15s ease;
    }
    .top-btn:hover { border-color: var(--accent-light); color: var(--accent-light); }

    .split {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ═══ LEFT PANEL: LIST ═══ */
    .panel-left {
      width: 380px;
      min-width: 300px;
      border-right: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg);
    }

    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border-color);
      flex-shrink: 0;
      background: var(--bg-secondary);
    }

    .tab {
      flex: 1;
      padding: 10px 8px;
      background: none; border: none;
      border-bottom: 2px solid transparent;
      color: var(--text-muted);
      font-family: var(--font-body); font-size: 13px; font-weight: 500;
      cursor: pointer; transition: all 0.15s ease;
      text-align: center;
    }
    .tab:hover { color: var(--text-primary); }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    .item-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .item-list::-webkit-scrollbar { width: 6px; }
    .item-list::-webkit-scrollbar-track { background: transparent; }
    .item-list::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 3px; }

    .list-item {
      padding: 12px 14px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all 0.12s ease;
      margin-bottom: 2px;
    }
    .list-item:hover { background: var(--bg-secondary); }
    .list-item.active { background: var(--accent-bg); border-left: 3px solid var(--accent); }

    .list-item-title {
      font-size: 14px; font-weight: 600;
      color: var(--text-primary); margin-bottom: 4px;
    }

    .list-item-meta {
      font-size: 11px; color: var(--text-muted);
      font-family: var(--font-mono);
      display: flex; justify-content: space-between;
    }

    .badge {
      display: inline-block; padding: 2px 6px; border-radius: 4px;
      font-size: 9px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase;
      margin-left: 6px;
    }
    .badge.new { background: rgba(109, 212, 156, 0.12); color: var(--success); }
    .badge.rising { background: rgba(228, 201, 106, 0.12); color: var(--warning); }
    .badge.steady { background: rgba(126, 196, 224, 0.12); color: var(--cyan); }
    .badge.falling { background: rgba(224, 112, 96, 0.12); color: var(--error); }

    /* ═══ RIGHT PANEL: READER ═══ */
    .panel-right {
      flex: 1;
      overflow-y: auto;
      background: var(--bg);
    }

    .reader-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-muted);
      gap: 12px;
    }
    .reader-empty span { font-size: 40px; opacity: 0.3; }
    .reader-empty p { font-size: 14px; }

    .reader {
      padding: 40px 48px;
      max-width: 800px;
    }

    .reader h1 {
      font-size: 26px; font-weight: 700; margin-bottom: 8px;
      color: var(--text-primary);
    }
    .reader h2 {
      font-size: 20px; font-weight: 600; margin-top: 32px; margin-bottom: 12px;
      color: var(--accent); border-bottom: 1px solid var(--border-color);
      padding-bottom: 8px;
    }
    .reader h3 {
      font-size: 16px; font-weight: 600; margin-top: 24px; margin-bottom: 8px;
      color: var(--text-secondary); text-transform: uppercase;
      letter-spacing: 0.5px; font-size: 12px;
    }
    .reader p {
      font-size: 14px; line-height: 1.8; color: var(--text-secondary);
      margin-bottom: 14px;
    }
    .reader ul, .reader ol {
      margin: 8px 0 16px 20px; color: var(--text-secondary);
    }
    .reader li { margin-bottom: 6px; font-size: 14px; line-height: 1.7; }
    .reader strong { color: var(--text-primary); }
    .reader code {
      font-family: var(--font-mono); font-size: 12px;
      padding: 2px 6px; background: var(--bg-secondary);
      border: 1px solid var(--border-color); border-radius: 4px;
      color: var(--accent-light);
    }
    .reader pre {
      background: var(--bg-secondary); border: 1px solid var(--border-color);
      border-radius: var(--radius-sm); padding: 16px;
      overflow-x: auto; margin: 12px 0;
      font-family: var(--font-mono); font-size: 12px;
      color: var(--text-tertiary); line-height: 1.5;
    }
    .reader pre code {
      background: none; border: none; padding: 0;
    }
    .reader blockquote {
      border-left: 3px solid var(--accent);
      padding: 8px 16px; margin: 12px 0;
      background: var(--accent-bg); border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
      color: var(--text-secondary); font-style: italic;
    }
    .reader table {
      width: 100%; border-collapse: collapse; margin: 12px 0;
      font-size: 13px;
    }
    .reader th, .reader td {
      padding: 8px 12px; text-align: left;
      border-bottom: 1px solid var(--border-color);
    }
    .reader th {
      font-weight: 600; color: var(--text-primary);
      background: var(--bg-secondary);
    }
    .reader td { color: var(--text-secondary); }
    .reader a {
      color: var(--accent-light); text-decoration: none;
    }
    .reader a:hover { text-decoration: underline; }
    .reader hr {
      border: none; border-top: 1px solid var(--border-color);
      margin: 24px 0;
    }

    /* ═══ MOBILE TOGGLE ═══ */
    .panel-toggle {
      display: none;
      width: 100%;
      padding: 10px 16px;
      background: var(--bg-secondary);
      border: none;
      border-bottom: 1px solid var(--border-color);
      color: var(--accent);
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      text-align: left;
      -webkit-tap-highlight-color: transparent;
    }
    .panel-toggle:hover { background: var(--bg-tertiary); }

    /* ═══ MOBILE: collapsible list ═══ */
    @media (max-width: 768px) {
      html, body { overflow: auto; }
      .split { flex-direction: column; height: auto; }
      .panel-toggle { display: block; }
      .panel-left {
        width: 100%; min-width: unset; border-right: none;
        border-bottom: 1px solid var(--border-color);
        max-height: 50vh;
        transition: max-height 0.3s ease, opacity 0.2s ease;
        overflow: hidden;
      }
      .panel-left.collapsed {
        max-height: 0; border-bottom: none;
        opacity: 0; pointer-events: none;
      }
      .panel-right { min-height: 55vh; }
      .reader { padding: 24px 16px; }
      .reader h1 { font-size: 22px; }
      .reader h2 { font-size: 17px; }
      .top-bar { padding: 10px 14px; }
      .top-bar h1 { font-size: 15px; }
    }

    @media (max-width: 480px) {
      .tab { font-size: 12px; padding: 8px 4px; }
      .list-item { padding: 10px 10px; }
      .list-item-title { font-size: 13px; }
      .reader { padding: 16px 12px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="top-bar">
      <h1>Ra Research Archive</h1>
      <div class="top-bar-right">
        <button class="top-btn" onclick="toggleTheme()" title="Toggle theme">☀️</button>
        <a href="/hq" class="top-btn">← hq</a>
      </div>
    </div>

    <div class="split">
      <!-- TOGGLE (mobile only) -->
      <button class="panel-toggle" id="panelToggle">&#9776; Browse items</button>
      <!-- LEFT: list -->
      <div class="panel-left" id="panelLeft">
        <div class="tabs">
          <button class="tab active" onclick="switchTab('trends')">Trends</button>
          <button class="tab" onclick="switchTab('entities')">Entities</button>
          <button class="tab" onclick="switchTab('topics')">Topics</button>
          <button class="tab" onclick="switchTab('lab')">Lab</button>
        </div>
        <div class="item-list" id="item-list">
          <div style="padding:32px;text-align:center;color:var(--text-muted);">Loading...</div>
        </div>
      </div>

      <!-- RIGHT: reader -->
      <div class="panel-right" id="reader-panel">
        <div class="reader-empty">
          <span>📚</span>
          <p>Select an item to read</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ── State ──
    let allData = { trends: [], entities: {}, topics: {}, lab: {} };
    let currentTab = 'trends';
    let activeSlug = null;

    // ── Parse index.md for dynamic file discovery ──
    function parseIndexForNames(indexText) {
      const sections = { entities: [], topics: [], lab: [] };
      let current = null;
      for (const line of indexText.split('\n')) {
        if (/^## Entities/i.test(line)) { current = 'entities'; continue; }
        if (/^## Topics/i.test(line)) { current = 'topics'; continue; }
        if (/^## Lab/i.test(line)) { current = 'lab'; continue; }
        if (/^## /.test(line)) { current = null; continue; }
        if (!current) continue;
        const match = line.match(/\[([^\]]+)\]\((?:entities|topics|lab)\/([^)]+)\.md\)/);
        if (match) sections[current].push({ display: match[1], slug: match[2] });
      }
      return sections;
    }

    // ── Load everything ──
    async function loadArchive() {
      try {
        const [indexRes, trendsRes] = await Promise.all([
          fetch('/docs/research/index.md'),
          fetch('/docs/research/trends.md')
        ]);
        const indexText = await indexRes.text();
        const trendsText = await trendsRes.text();
        const discovered = parseIndexForNames(indexText);

        // Parse trends
        allData.trends = [];
        for (const line of trendsText.split('\n')) {
          if (line.includes('| new ') || line.includes('| rising ') || line.includes('| steady ') || line.includes('| falling ')) {
            const parts = line.split('|').map(p => p.trim()).filter(p => p);
            if (parts.length >= 2) {
              const name = parts[0].includes('[') ? parts[0].match(/\[([^\]]+)\]/)?.[1] || parts[0] : parts[0];
              allData.trends.push({ name, trend: parts[1] });
            }
          }
        }

        // Load all files in parallel
        const loadCategory = async (category, items) => {
          const results = {};
          await Promise.all(items.map(async ({ display, slug }) => {
            try {
              const res = await fetch(`/docs/research/${category}/${slug}.md`);
              if (res.ok) results[slug] = { display, content: await res.text() };
            } catch (e) {}
          }));
          return results;
        };

        const [entities, topics, lab] = await Promise.all([
          loadCategory('entities', discovered.entities.length ? discovered.entities : [
            {display:'Bitcoin',slug:'bitcoin'},{display:'Federal Reserve',slug:'fed'},
            {display:'Marimo',slug:'marimo'},{display:'AI Scientist-v2',slug:'ai-scientist-v2'},
            {display:'CPUID',slug:'cpuid'}
          ]),
          loadCategory('topics', discovered.topics.length ? discovered.topics : [
            {display:'Macro Rates',slug:'macro-rates'},{display:'Crypto Flows',slug:'crypto-flow'},
            {display:'AI Research',slug:'ai-research-architectures'},{display:'Supply Chain',slug:'agent-supply-chain'}
          ]),
          loadCategory('lab', discovered.lab.length ? discovered.lab : [
            {display:'Agent Runtime',slug:'agent-runtime-hybrid'},{display:'Browser Risk',slug:'ai-browser-extension-risk'},
            {display:'AI Scientist',slug:'ai-scientist-v2'}
          ])
        ]);

        allData.entities = entities;
        allData.topics = topics;
        allData.lab = lab;

        renderList();
      } catch (error) {
        document.getElementById('item-list').innerHTML =
          '<div style="padding:32px;text-align:center;color:var(--error);">Failed to load</div>';
      }
    }

    // ── Render the left-side list based on current tab ──
    function renderList() {
      const list = document.getElementById('item-list');

      if (currentTab === 'trends') {
        list.innerHTML = allData.trends.map((t, i) => {
          const cls = t.trend.toLowerCase().replace(/\s+/g, '');
          return `<div class="list-item ${activeSlug === 'trend-'+i ? 'active' : ''}"
                       onclick="showTrend(${i})">
            <div class="list-item-title">${t.name}<span class="badge ${cls}">${t.trend}</span></div>
            <div class="list-item-meta"><span>Trend</span></div>
          </div>`;
        }).join('') || '<div style="padding:32px;text-align:center;color:var(--text-muted);">No trends</div>';
        return;
      }

      const data = allData[currentTab] || {};
      const entries = Object.entries(data);
      if (entries.length === 0) {
        list.innerHTML = '<div style="padding:32px;text-align:center;color:var(--text-muted);">No items found</div>';
        return;
      }

      list.innerHTML = entries.map(([slug, { display, content }]) => {
        const meta = extractMeta(content);
        const isNew = isNewItem(meta.dateObj);
        const icon = currentTab === 'entities' ? '📊' : currentTab === 'topics' ? '🔍' : '🧪';
        return `<div class="list-item ${activeSlug === slug ? 'active' : ''}"
                     onclick="showContent('${slug}')">
          <div class="list-item-title">${display || extractTitle(content)}${isNew ? '<span class="badge new">NEW</span>' : ''}</div>
          <div class="list-item-meta"><span>${icon} ${currentTab}</span><span>${meta.lastSeen}</span></div>
        </div>`;
      }).join('');
    }

    // ── Show content in the right panel ──
    function showContent(slug) {
      activeSlug = slug;
      const data = allData[currentTab]?.[slug];
      if (!data) return;

      const panel = document.getElementById('reader-panel');
      panel.innerHTML = `<div class="reader">${renderMarkdown(data.content)}</div>`;
      panel.scrollTop = 0;
      renderList(); // re-render to update active state
    }

    function showTrend(index) {
      activeSlug = 'trend-' + index;
      const trend = allData.trends[index];
      if (!trend) return;

      // Find matching entity/topic to show
      const slug = trend.name.toLowerCase().replace(/[^a-z0-9]+/g, '-');
      let content = null;
      for (const cat of ['entities', 'topics', 'lab']) {
        for (const [s, d] of Object.entries(allData[cat])) {
          if (d.display && d.display.toLowerCase().includes(trend.name.toLowerCase())) {
            content = d.content;
            break;
          }
        }
        if (content) break;
      }

      const panel = document.getElementById('reader-panel');
      if (content) {
        panel.innerHTML = `<div class="reader">${renderMarkdown(content)}</div>`;
      } else {
        panel.innerHTML = `<div class="reader">
          <h1>${trend.name}</h1>
          <p style="color:var(--text-muted);margin-top:16px;">Trend status: <span class="badge ${trend.trend.toLowerCase()}">${trend.trend}</span></p>
          <p style="color:var(--text-muted);margin-top:8px;">Detailed research file not yet available for this trend. Check Entities or Topics tabs for related content.</p>
        </div>`;
      }
      panel.scrollTop = 0;
      renderList();
    }

    // ── Tab switching ──
    function switchTab(tab) {
      currentTab = tab;
      activeSlug = null;
      document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
      event.target.closest('.tab').classList.add('active');
      renderList();
      // Reset reader
      document.getElementById('reader-panel').innerHTML =
        '<div class="reader-empty"><span>📚</span><p>Select an item to read</p></div>';
    }

    // ── Helpers ──
    function extractTitle(content) {
      const match = content.match(/^#\s+(.+)/m);
      return match ? match[1].replace(/Entity:|Topic:|Lab:/, '').trim() : 'Untitled';
    }

    function extractMeta(content) {
      const dateMatch = content.match(/(\d{4}-\d{2}-\d{2})/);
      const dateStr = dateMatch ? dateMatch[1] : null;
      return { lastSeen: dateStr || 'N/A', dateObj: dateStr ? new Date(dateStr) : null };
    }

    function isNewItem(dateObj) {
      if (!dateObj) return false;
      return (Date.now() - dateObj.getTime()) <= 3 * 86400000;
    }

    function renderMarkdown(md) {
      // Handle code blocks first (preserve them)
      const codeBlocks = [];
      md = md.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
        codeBlocks.push(`<pre><code>${code.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</code></pre>`);
        return `%%CODEBLOCK${codeBlocks.length - 1}%%`;
      });

      let html = md
        .replace(/^#### (.+)$/gm, '<h4 style="font-size:13px;font-weight:600;margin:16px 0 6px;color:var(--text-secondary);">$1</h4>')
        .replace(/^### (.+)$/gm, '<h3>$1</h3>')
        .replace(/^## (.+)$/gm, '<h2>$1</h2>')
        .replace(/^# (.+)$/gm, '<h1>$1</h1>')
        .replace(/^---$/gm, '<hr>')
        .replace(/^>\s?(.+)$/gm, '<blockquote>$1</blockquote>')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g, '<em>$1</em>')
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>')
        // Tables
        .replace(/^\|(.+)\|$/gm, (match) => {
          const cells = match.split('|').filter(c => c.trim()).map(c => c.trim());
          if (cells.every(c => /^[-:]+$/.test(c))) return '%%TABLE_SEP%%';
          return '<tr>' + cells.map(c => `<td>${c}</td>`).join('') + '</tr>';
        });

      // Wrap table rows
      html = html.replace(/((?:<tr>.*<\/tr>\n?)+)/g, (match) => {
        let rows = match.replace('%%TABLE_SEP%%\n', '');
        // Make first row header
        rows = rows.replace(/<tr>(.*?)<\/tr>/, (m, inner) =>
          '<thead><tr>' + inner.replace(/<td>/g, '<th>').replace(/<\/td>/g, '</th>') + '</tr></thead><tbody>'
        );
        return '<table>' + rows + '</tbody></table>';
      });
      html = html.replace(/%%TABLE_SEP%%/g, '');

      // Lists
      html = html.replace(/^(\s*)[-*]\s+(.+)$/gm, '$1<li>$2</li>');
      html = html.replace(/((?:<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>');
      html = html.replace(/^(\d+)\.\s+(.+)$/gm, '<li>$2</li>');

      // Paragraphs: wrap remaining loose text
      html = html.split('\n\n').map(block => {
        block = block.trim();
        if (!block) return '';
        if (block.startsWith('<')) return block;
        return `<p>${block.replace(/\n/g, '<br>')}</p>`;
      }).join('\n');

      // Restore code blocks
      html = html.replace(/%%CODEBLOCK(\d+)%%/g, (_, i) => codeBlocks[i]);

      return html;
    }

    // ── Theme ──
    function toggleTheme() {
      const html = document.documentElement;
      const isDark = html.getAttribute('data-theme') !== 'light';
      html.setAttribute('data-theme', isDark ? 'light' : 'dark');
      document.querySelector('.top-btn').textContent = isDark ? '🌙' : '☀️';
    }

    // ── Mobile panel toggle ──
    const panelToggle = document.getElementById('panelToggle');
    const panelLeft = document.getElementById('panelLeft');

    panelToggle.addEventListener('click', () => {
      const collapsed = panelLeft.classList.toggle('collapsed');
      panelToggle.textContent = collapsed ? '\u2630 Browse items' : '\u2715 Close list';
    });

    // Auto-collapse list when item selected on mobile
    const origShowContent = window.showContent;
    window.showContent = function(slug) {
      origShowContent(slug);
      if (window.innerWidth <= 768) {
        panelLeft.classList.add('collapsed');
        panelToggle.textContent = '\u2630 Browse items';
      }
    };
    const origShowTrend = window.showTrend;
    window.showTrend = function(index) {
      origShowTrend(index);
      if (window.innerWidth <= 768) {
        panelLeft.classList.add('collapsed');
        panelToggle.textContent = '\u2630 Browse items';
      }
    };

    // ── Init ──
    document.addEventListener('DOMContentLoaded', () => {
      const savedTheme = 'dark';
      document.documentElement.setAttribute('data-theme', savedTheme);
      loadArchive();
    });
  </script>
</body>
</html>
