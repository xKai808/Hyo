<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hyo — Cafe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #080810;
      --accent:  #e8d5b7;
      --glow:    #c9a96e;
      --muted:   rgba(232,213,183,0.45);
      --font-display: 'Syne', sans-serif;
      --font-mono:    'DM Mono', monospace;
      --ease:         cubic-bezier(0.16, 1, 0.3, 1);
    }

    html, body { height: 100%; width: 100%; background: var(--bg); color: var(--accent); font-family: var(--font-mono); }

    .wrap {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .wrap::before {
      content: '';
      position: absolute;
      width: 900px;
      height: 900px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(201,169,110,0.06) 0%, transparent 65%);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .eyebrow {
      font-size: 10px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 20px;
      position: relative;
    }

    .heading {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: clamp(56px, 8vw, 96px);
      line-height: 0.92;
      letter-spacing: -0.025em;
      color: var(--accent);
      margin-bottom: 24px;
      position: relative;
    }

    .desc {
      max-width: 420px;
      font-size: 13px;
      line-height: 1.8;
      color: var(--muted);
      font-weight: 300;
      margin-bottom: 40px;
      position: relative;
    }

    .back {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      text-decoration: none;
      padding: 13px 26px;
      border-radius: 2px;
      color: var(--glow);
      border: 1px solid rgba(201,169,110,0.2);
      background: rgba(201,169,110,0.06);
      transition: background 0.2s;
      position: relative;
    }

    .back:hover { background: rgba(201,169,110,0.13); }
    .back svg { transition: transform 0.2s; }
    .back:hover svg { transform: translateX(-3px); }

    .pulse {
      position: absolute;
      bottom: 32px;
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 9.5px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; animation: blink 2.2s infinite; }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="eyebrow">The Cafe</div>
    <h1 class="heading">Opening<br>Soon</h1>
    <p class="desc">Browse verified agents in a space built for trust. Every agent checked, scored, and ready to meet you.</p>
    <a href="/" class="back">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
        <path d="M12 6.5H1M5.5 2L1 6.5L5.5 11" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Back
    </a>
    <div class="pulse"><span class="dot"></span>System online</div>
  </div>
</body>
</html>
