<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Aurora — sign in</title>
  <meta name="robots" content="noindex, nofollow" />
  <meta name="theme-color" content="#0a0a12" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500;600&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0a0a12;
      --bg-card:  #0f0f1a;
      --fg:       #f2e2c4;
      --muted:    rgba(242, 226, 196, 0.55);
      --dim:      rgba(242, 226, 196, 0.32);
      --border:   rgba(242, 226, 196, 0.10);
      --accent:   #e8b877;
      --ok:       #a3c98a;
      --err:      #e89070;
      --font-d:   'Syne', sans-serif;
      --font-b:   'Inter', sans-serif;
      --font-m:   'DM Mono', monospace;
    }

    html, body {
      min-height: 100%; background: var(--bg); color: var(--fg);
      font-family: var(--font-b);
    }

    body::before {
      content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background:
        radial-gradient(ellipse 80% 50% at 50% 0%, rgba(232,184,119,0.09), transparent 60%);
    }

    .wrap {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 48px 24px;
    }

    .card {
      width: 100%; max-width: 400px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 40px 36px;
    }

    .logo {
      font-family: var(--font-d); font-weight: 800; font-size: 28px;
      color: var(--accent); letter-spacing: 0.04em; text-align: center;
      margin-bottom: 8px;
    }

    .tagline {
      text-align: center; font-size: 13px; color: var(--muted);
      font-family: var(--font-m); letter-spacing: 0.08em;
      margin-bottom: 36px;
    }

    label {
      display: block; font-size: 12px; color: var(--muted);
      font-family: var(--font-m); letter-spacing: 0.1em; text-transform: uppercase;
      margin-bottom: 8px;
    }

    input[type="email"] {
      width: 100%;
      background: rgba(242, 226, 196, 0.05);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      font-family: var(--font-b); font-size: 15px;
      color: var(--fg);
      outline: none;
      transition: border-color 0.15s;
      -webkit-appearance: none;
    }

    input[type="email"]::placeholder { color: var(--dim); }
    input[type="email"]:focus { border-color: var(--accent); }

    button {
      width: 100%; margin-top: 16px;
      background: var(--accent);
      color: #0a0a12;
      border: none; border-radius: 10px;
      padding: 14px 20px;
      font-family: var(--font-d); font-weight: 700; font-size: 15px;
      letter-spacing: 0.03em;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    button:hover { opacity: 0.9; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .status {
      margin-top: 20px; padding: 14px 16px; border-radius: 10px;
      font-size: 14px; line-height: 1.6; display: none;
    }
    .status.ok  { background: rgba(163, 201, 138, 0.12); border: 1px solid rgba(163,201,138,0.3); color: var(--ok); }
    .status.err { background: rgba(232, 144, 112, 0.12); border: 1px solid rgba(232,144,112,0.3); color: var(--err); }

    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 28px 0 20px;
    }
    .divider-line { flex: 1; height: 1px; background: var(--border); }
    .divider-text { font-size: 11px; color: var(--dim); font-family: var(--font-m); letter-spacing: 0.1em; }

    .help-link {
      display: block; text-align: center;
      font-size: 13px; color: var(--dim); text-decoration: none;
      font-family: var(--font-b);
      transition: color 0.15s;
    }
    .help-link:hover { color: var(--accent); }

    .footer {
      margin-top: 32px; text-align: center;
      font-size: 12px; color: var(--dim);
      font-family: var(--font-m);
    }
    .footer a { color: var(--dim); text-decoration: none; }
    .footer a:hover { color: var(--accent); }

    /* ── Light mode ── */
    :root[data-theme="light"] {
      --bg:       #f8f4ee;
      --bg-deep:  #ede8df;
      --bg-card:  #ffffff;
      --fg:       #1c160f;
      --muted:    rgba(28, 22, 15, 0.55);
      --dim:      rgba(28, 22, 15, 0.35);
      --faint:    rgba(28, 22, 15, 0.18);
      --border:   rgba(28, 22, 15, 0.12);
      --border-hover: rgba(28, 22, 15, 0.22);
      --accent:   #b8741a;
      --accent-bright: #c8841e;
      --accent-dim: rgba(184, 116, 26, 0.09);
      --accent-line: rgba(184, 116, 26, 0.28);
      --bg-card-hover: #f5f0e8;
      --bg-reader: #fdfaf5;
      --ok:       #3a7a28;
      --err:      #b84030;
    }
    .theme-toggle {
      background: none; border: 1px solid var(--border); border-radius: 100px;
      color: var(--dim); cursor: pointer; font-size: 13px; padding: 4px 10px;
      font-family: var(--font-m); letter-spacing: 0.08em;
      transition: color 0.2s, border-color 0.2s;
    }
    .theme-toggle:hover { color: var(--fg); border-color: var(--accent-line); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="logo">Aurora</div>
      <div class="tagline">your morning brief</div>

      <!-- Email form -->
      <div id="formSection">
        <label for="emailInput">Your email</label>
        <input
          type="email"
          id="emailInput"
          placeholder="you@example.com"
          autocomplete="email"
          inputmode="email"
        />
        <button id="sendBtn" onclick="sendLink()">Send my sign-in link</button>
        <div class="status" id="status"></div>
      </div>

      <div class="divider">
        <div class="divider-line"></div>
        <div class="divider-text">or</div>
        <div class="divider-line"></div>
      </div>

      <a href="/aurora" class="help-link">Not subscribed yet? Join Aurora →</a>
    </div>

    <div class="footer">
      <a href="/">hyo.world</a> &nbsp;·&nbsp;
      <a href="mailto:hello@hyo.world">hello@hyo.world</a>
    </div>
  </div>

  <script>
    // Pre-fill from URL param (e.g. /app?email=user@example.com)
    const urlEmail = new URLSearchParams(window.location.search).get('email');
    if (urlEmail) document.getElementById('emailInput').value = urlEmail;

    // If already has id+token in URL, redirect to aurora-page
    const p = new URLSearchParams(window.location.search);
    if (p.get('id') && p.get('token')) {
      window.location.replace(`/aurora-page?id=${p.get('id')}&token=${p.get('token')}`);
    }

    async function sendLink() {
      const email = document.getElementById('emailInput').value.trim().toLowerCase();
      const btn   = document.getElementById('sendBtn');
      const status = document.getElementById('status');

      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        showStatus('err', 'Please enter a valid email address.');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Sending…';
      status.style.display = 'none';

      try {
        const res = await fetch('/api/aurora-magic-link', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        const j = await res.json();

        if (j.ok) {
          if (j.pageUrl) {
            // Dev mode: show the link directly
            showStatus('ok',
              `✓ Found your account.<br>
              <a href="${j.pageUrl}" style="color:var(--accent);word-break:break-all;">${j.pageUrl}</a>
              <br><small style="opacity:0.7;font-size:0.85em;">Bookmark this link to access your briefs.</small>`
            );
          } else {
            showStatus('ok', '✓ Check your inbox — your sign-in link is on the way.');
          }
          document.getElementById('formSection').querySelector('button').style.display = 'none';
        } else {
          showStatus('err', j.error || 'Something went wrong. Try again.');
          btn.disabled = false;
          btn.textContent = 'Send my sign-in link';
        }
      } catch (e) {
        showStatus('err', 'Network error. Check your connection and try again.');
        btn.disabled = false;
        btn.textContent = 'Send my sign-in link';
      }
    }

    function showStatus(type, msg) {
      const el = document.getElementById('status');
      el.className = `status ${type}`;
      el.innerHTML = msg;
      el.style.display = 'block';
    }

    // Submit on Enter
    document.getElementById('emailInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') sendLink();
    });
  </script>
  <script>
    function applyTheme(t) {
      document.documentElement.setAttribute('data-theme', t);
      const btn = document.getElementById('themeToggle');
      if (btn) btn.textContent = t === 'light' ? '☾' : '☀';
    }
    function toggleTheme() {
      const cur = document.documentElement.getAttribute('data-theme') || 'dark';
      const next = cur === 'dark' ? 'light' : 'dark';
      localStorage.setItem('aurora-theme', next);
      applyTheme(next);
    }
    (function() { applyTheme(localStorage.getItem('aurora-theme') || 'dark'); })();
  </script>
</body>
</html>
