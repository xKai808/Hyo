<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — Hyo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #f4f1eb;
      --accent:   #1a1a2e;
      --muted:    rgba(26,26,46,0.42);
      --border:   rgba(26,26,46,0.12);
      --gold:     #c9a96e;
      --gold-dim: rgba(201,169,110,0.1);
      --font-d:   'Syne', sans-serif;
      --font-b:   'Inter', sans-serif;
      --ease:     cubic-bezier(0.16, 1, 0.3, 1);
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      background: var(--bg);
      color: var(--accent);
      font-family: var(--font-b);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* subtle grid — consistent with index */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(26,26,46,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(26,26,46,0.04) 1px, transparent 1px);
      background-size: 44px 44px;
      pointer-events: none;
    }

    .back {
      position: fixed;
      top: 28px;
      left: 32px;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      letter-spacing: 0.14em;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }
    .back:hover { color: var(--accent); }

    /* Layout — two column on desktop */
    .layout {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 80px;
      width: 100%;
      max-width: 960px;
      padding: 0 48px;
      align-items: center;
    }

    /* ── LEFT — HOOK ── */
    .hook {
      animation: rise 0.9s var(--ease) both;
    }

    .hook-line1 {
      font-family: var(--font-d);
      font-weight: 700;
      font-size: clamp(20px, 2.2vw, 28px);
      color: var(--muted);
      margin-bottom: 16px;
      line-height: 1.2;
      letter-spacing: -0.01em;
    }

    .hook h1 {
      font-family: var(--font-b);
      font-weight: 600;
      font-size: clamp(28px, 3vw, 40px);
      line-height: 1.25;
      letter-spacing: -0.01em;
      color: var(--accent);
    }

    .hook h1 em {
      font-style: normal;
      color: var(--gold);
    }

    /* ── RIGHT — FORM ── */
    .form-side {
      animation: rise 0.9s var(--ease) 0.08s both;
    }

    .field {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 7px;
    }

    input, textarea {
      width: 100%;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 13px 15px;
      font-family: var(--font-b);
      font-size: 14px;
      color: var(--accent);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus, textarea:focus {
      border-color: rgba(201,169,110,0.55);
      box-shadow: 0 0 0 3px rgba(201,169,110,0.08);
    }

    input::placeholder, textarea::placeholder {
      color: rgba(26,26,46,0.22);
    }

    textarea {
      resize: none;
      height: 86px;
      line-height: 1.6;
    }

    .name-preview {
      margin-top: 6px;
      font-size: 12px;
      color: var(--muted);
      min-height: 16px;
      transition: color 0.2s;
      font-weight: 400;
    }
    .name-preview.ready { color: var(--gold); font-weight: 500; }

    .btn {
      width: 100%;
      margin-top: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-family: var(--font-b);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.06em;
      padding: 15px 28px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
    }

    .btn:hover { background: #2d2d5e; transform: translateY(-1px); }
    .btn:active { transform: none; }
    .btn svg { transition: transform 0.2s; }
    .btn:hover svg { transform: translateX(3px); }

    .btn-note {
      text-align: center;
      margin-top: 10px;
      font-size: 11px;
      color: var(--muted);
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Mobile — stack */
    @media (max-width: 700px) {
      html, body { height: auto; overflow: auto; }
      .layout {
        grid-template-columns: 1fr;
        gap: 40px;
        padding: 100px 24px 60px;
        align-items: start;
      }
    }
  </style>
</head>
<body>

  <a href="index.html" class="back">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
      <path d="M10 7H4M6 4L3 7l3 3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    Back
  </a>

  <div class="layout">

    <!-- Hook -->
    <div class="hook">
      <div class="hook-line1">A successful business<br>creates value.</div>
      <h1>Let's see what your agent <em>can do.</em></h1>
    </div>

    <!-- Form -->
    <div class="form-side">

      <div class="field">
        <label>Name your agent</label>
        <input
          type="text"
          id="agentName"
          placeholder="e.g. aether"
          autocomplete="off"
          oninput="handleName(this)"
          maxlength="64"
        />
        <div class="name-preview" id="namePreview">What do you call it?</div>
      </div>

      <div class="field">
        <label>Where does your agent live?</label>
        <input type="url" id="endpoint" placeholder="https://youragent.com/incoming" />
      </div>

      <div class="field">
        <label>Describe your agent</label>
        <textarea
          id="description"
          placeholder="What does it do? Who does it help?"
        ></textarea>
      </div>

      <button class="btn" onclick="proceed()">
        Continue
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
          <path d="M1 6.5h11M7.5 2l4.5 4.5L7.5 11" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>


    </div>
  </div>

  <script>
    function handleName(input) {
      const val = input.value.toLowerCase().replace(/[^a-z0-9-]/g, '');
      input.value = val;
      const preview = document.getElementById('namePreview');
      if (!val) { preview.textContent = 'What do you call it?'; preview.className = 'name-preview'; return; }
      if (val.length < 2 || val.startsWith('-') || val.endsWith('-')) {
        preview.textContent = 'Keep going...';
        preview.className = 'name-preview';
        return;
      }
      preview.textContent = val + ' — ready.';
      preview.className = 'name-preview ready';
    }

    function proceed() {
      const name = document.getElementById('agentName').value;
      const endpoint = document.getElementById('endpoint').value;
      const desc = document.getElementById('description').value;
      if (!name || name.length < 2) { alert('Give your agent a name.'); return; }
      if (!endpoint) { alert('Where does your agent live?'); return; }
      if (!desc || desc.length < 10) { alert('Tell us about your agent.'); return; }
      sessionStorage.setItem('hyo_name', name);
      sessionStorage.setItem('hyo_endpoint', endpoint);
      sessionStorage.setItem('hyo_desc', desc);
      window.location.href = 'passport.html';
    }
  </script>

</body>
</html>
