let _aetherStratSort = 'net';
let _aetherSelectedDay = null;
let _aetherContainer = null;
let _aetherAgentRef = null;

function aetherSortStrat(key) {
  _aetherStratSort = key;
  if (_aetherContainer && _aetherAgentRef) renderAetherDashboard(_aetherContainer, _aetherAgentRef);
}
function aetherToggleDay(idx) {
  _aetherSelectedDay = (_aetherSelectedDay === idx) ? null : idx;
  if (_aetherContainer && _aetherAgentRef) renderAetherDashboard(_aetherContainer, _aetherAgentRef);
}

// ═══ AETHER DASHBOARD ═══
function renderAetherDashboard(container, agent) {
  _aetherContainer = container;
  _aetherAgentRef = agent;

  if (!AETHER_DATA) {
    container.innerHTML = '<div class="empty-state">Aether metrics not loaded</div>';
    return;
  }

  const data = AETHER_DATA;
  const week = data.currentWeek || {};
  const dailyPnl = week.dailyPnl || [];
  const openIssues = data.openIssues || [];
  const strategies = week.strategies || [];

  // ── Helpers (all colors via CSS variables) ────────────────────────────────
  const pnlCssColor = v => v > 0 ? 'var(--success)' : v < 0 ? 'var(--error)' : 'var(--text-muted)';
  // SVG can't resolve CSS vars in presentation attrs — use site's actual hex values
  const pnlSvgColor = v => v >= 0 ? '#6dd49c' : '#e07060';
  const fmtPnl = v => v == null ? '—' : (v >= 0 ? '+' : '') + '$' + Math.abs(v).toFixed(2);

  // Status badge styles using site color tokens
  const SC = {
    ACTIVE:  { bg: 'rgba(109,212,156,0.10)', border: 'rgba(109,212,156,0.30)', text: 'var(--success)' },
    WATCH:   { bg: 'rgba(232,201,106,0.10)', border: 'rgba(232,201,106,0.30)', text: 'var(--warning)' },
    ALERT:   { bg: 'rgba(224,112,96,0.10)',  border: 'rgba(224,112,96,0.30)',  text: 'var(--error)' },
    MONITOR: { bg: 'rgba(126,196,224,0.10)', border: 'rgba(126,196,224,0.30)', text: 'var(--cyan)' },
  };
  // Priority colors — P0 = error, P1 = between error/warning, P2 = warning, P3 = muted
  const PC = {
    P0: 'var(--error)',
    P1: 'var(--warning)',
    P2: 'var(--accent)',
    P3: 'var(--text-muted)',
  };

  function deriveStatus(s) {
    if (s.winRate < 40 || s.pnl < -5) return 'ALERT';
    if (s.winRate < 60 || s.pnl < 0) return 'WATCH';
    if (s.trades < 5) return 'MONITOR';
    return 'ACTIVE';
  }

  function wrBar(wins, total) {
    const wr = total === 0 ? 0 : (wins / total) * 100;
    const col = wr >= 75 ? 'var(--success)' : wr >= 60 ? 'var(--warning)' : 'var(--error)';
    return `<div style="display:flex;align-items:center;gap:8px">
      <div style="width:72px;height:5px;background:var(--bg-tertiary);border-radius:3px;overflow:hidden">
        <div style="width:${wr.toFixed(1)}%;height:100%;background:${col};border-radius:3px;transition:width 0.4s"></div>
      </div>
      <span style="color:${col};font-family:var(--font-mono);font-size:11px;min-width:32px">${Math.round(wr)}%</span>
    </div>`;
  }

  function statusBadge(status) {
    const c = SC[status] || SC.MONITOR;
    return `<span style="padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;letter-spacing:0.06em;font-family:var(--font-mono);background:${c.bg};border:1px solid ${c.border};color:${c.text}">${status}</span>`;
  }

  function netCell(v) {
    return `<span style="color:${pnlCssColor(v)};font-family:var(--font-mono);font-weight:600;font-size:13px">${fmtPnl(v)}</span>`;
  }

  function sparkline(pts) {
    if (!pts || pts.length < 2) return '';
    const mn = Math.min(...pts), mx = Math.max(...pts), rng = mx - mn || 1;
    const W = 52, H = 18;
    const coords = pts.map((v, i) => `${((i / (pts.length - 1)) * W).toFixed(1)},${(H - ((v - mn) / rng) * H).toFixed(1)}`).join(' ');
    const dots = pts.map((v, i) => `<circle cx="${((i / (pts.length - 1)) * W).toFixed(1)}" cy="${(H - ((v - mn) / rng) * H).toFixed(1)}" r="2" fill="${pnlSvgColor(v)}"/>`).join('');
    // stroke uses site success hex with alpha
    return `<svg width="${W}" height="${H}" style="overflow:visible;display:block"><polyline points="${coords}" fill="none" stroke="#6dd49c66" stroke-width="1.5"/>${dots}</svg>`;
  }

  function sortTH(label, key, currentSort, fn) {
    const active = currentSort === key;
    return `<th style="padding:8px 10px;text-align:left;font-weight:500;border-bottom:1px solid var(--border-color)">
      <span onclick="${fn}('${key}')" style="cursor:pointer;color:${active ? 'var(--accent)' : 'var(--text-muted)'};font-size:10px;font-family:var(--font-mono);letter-spacing:0.06em;user-select:none;text-transform:uppercase">
        ${label}${active ? ' ↓' : ''}
      </span>
    </th>`;
  }

  // ── Enriched strategies ───────────────────────────────────────────────────
  const enriched = strategies.map(s => ({
    ...s,
    derivedStatus: deriveStatus(s),
    sparkPts: dailyPnl.map(d => ((d.strategies || {})[s.name] || {}).pnl || 0)
  }));

  const sortedStrats = [...enriched].sort((a, b) => {
    if (_aetherStratSort === 'net')    return b.pnl - a.pnl;
    if (_aetherStratSort === 'wr')     return b.winRate - a.winRate;
    if (_aetherStratSort === 'trades') return b.trades - a.trades;
    return 0;
  });

  // ── Top-level metrics ─────────────────────────────────────────────────────
  const totalNet = week.pnl || 0;
  const currentBalance = week.currentBalance || 0;
  const overallWR = week.winRate || 0;
  const totalTrades = week.trades || 0;
  const totalWins = week.wins || 0;
  const totalLosses = week.losses || 0;

  // ── Strategy rows ─────────────────────────────────────────────────────────
  const stratRows = sortedStrats.map((s, i) => `
    <tr style="border-bottom:1px solid var(--border-color)">
      <td style="padding:10px 10px">
        <div style="font-family:var(--font-mono);font-size:12px;color:var(--text-primary);font-weight:500">${s.name}</div>
      </td>
      <td style="padding:10px 10px">
        <div style="color:var(--text-secondary);font-family:var(--font-mono);font-size:12px">${s.trades}</div>
        <div style="color:var(--text-muted);font-size:10px;margin-top:2px">${s.wins}W / ${s.losses}L</div>
      </td>
      <td style="padding:10px 10px">${wrBar(s.wins, s.trades)}</td>
      <td class="aether-hide-mobile" style="padding:10px 10px"><span style="color:var(--text-muted);font-family:var(--font-mono);font-size:12px">—</span></td>
      <td class="aether-hide-mobile" style="padding:10px 10px"><span style="color:var(--text-muted);font-family:var(--font-mono);font-size:12px">—</span></td>
      <td style="padding:10px 10px">${netCell(s.pnl)}</td>
      <td style="padding:10px 10px">${statusBadge(s.derivedStatus)}</td>
      <td class="aether-hide-mobile" style="padding:10px 10px;width:64px;opacity:0.85">${s.trades >= 2 ? sparkline(s.sparkPts) : ''}</td>
    </tr>`).join('');

  // ── Daily feed cards ──────────────────────────────────────────────────────
  const feedCards = [...dailyPnl].reverse().map((d, i) => {
    const isPos = d.pnl >= 0;
    const isSelected = _aetherSelectedDay === i;
    const isLast = i === 0;
    const accentBorder = isLast ? 'var(--cyan)' : isPos ? 'var(--success)' : 'var(--error)';
    const stratBreakdown = Object.entries(d.strategies || {}).map(([sn, sv]) =>
      `<div style="display:flex;justify-content:space-between;padding:3px 0;font-size:11px;font-family:var(--font-mono)"><span style="color:var(--text-muted)">${sn}</span><span style="color:${pnlCssColor(sv.pnl)}">${fmtPnl(sv.pnl)}</span></div>`
    ).join('');
    return `
      <div onclick="aetherToggleDay(${i})" style="background:${isSelected ? 'var(--bg-tertiary)' : 'var(--bg-secondary)'};border:1px solid ${isSelected ? 'var(--border-hover)' : 'var(--border-color)'};border-left:3px solid ${accentBorder};border-radius:var(--radius-sm);padding:12px 14px;cursor:pointer;margin-bottom:8px;transition:all 0.2s">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <div>
            <span style="color:var(--text-muted);font-family:var(--font-mono);font-size:11px">${d.day || ''}</span>
            <span style="color:var(--text-secondary);font-size:12px;margin-left:6px">${d.date}</span>
            ${isLast ? '<span style="margin-left:8px;font-size:9px;font-weight:600;color:var(--cyan);border:1px solid rgba(126,196,224,0.3);border-radius:3px;padding:1px 5px;font-family:var(--font-mono)">LIVE</span>' : ''}
          </div>
          <div style="text-align:right">
            <div style="color:${pnlCssColor(d.pnl)};font-family:var(--font-mono);font-weight:600;font-size:14px">${fmtPnl(d.pnl)}</div>
            <div style="color:var(--text-muted);font-size:11px;margin-top:1px">${d.trades} trades</div>
          </div>
        </div>
        ${isSelected ? `<div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border-color)">
          <div style="display:flex;gap:20px;margin-bottom:10px">
            <div>
              <div style="color:var(--text-muted);font-size:10px;font-family:var(--font-mono);text-transform:uppercase;margin-bottom:2px">Open</div>
              <div style="color:var(--text-secondary);font-family:var(--font-mono);font-size:12px">$${(d.balanceStart || 0).toFixed(2)}</div>
            </div>
            <div>
              <div style="color:var(--text-muted);font-size:10px;font-family:var(--font-mono);text-transform:uppercase;margin-bottom:2px">Close</div>
              <div style="color:var(--text-secondary);font-family:var(--font-mono);font-size:12px">$${(d.balanceEnd || 0).toFixed(2)}</div>
            </div>
            <div>
              <div style="color:var(--text-muted);font-size:10px;font-family:var(--font-mono);text-transform:uppercase;margin-bottom:2px">Win Rate</div>
              <div style="color:var(--text-secondary);font-family:var(--font-mono);font-size:12px">${(d.winRate || 0).toFixed(1)}%</div>
            </div>
          </div>
          <div style="color:var(--text-muted);font-size:10px;font-family:var(--font-mono);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px">Strategy Breakdown</div>
          ${stratBreakdown || '<div style="color:var(--text-muted);font-size:11px">no breakdown available</div>'}
        </div>` : ''}
      </div>`;
  }).join('');

  // ── Balance ledger ────────────────────────────────────────────────────────
  const startEntry = week.startingBalance ? `
    <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border-color)">
      <div>
        <span style="color:var(--text-tertiary);font-family:var(--font-mono);font-size:12px">${week.start || 'Week Start'}</span>
        <span style="margin-left:6px;font-size:10px;color:var(--text-muted);font-family:var(--font-mono)">start</span>
      </div>
      <div style="text-align:right">
        <div style="font-family:var(--font-mono);font-size:13px;color:var(--text-secondary)">$${(week.startingBalance || 0).toFixed(2)}</div>
      </div>
    </div>` : '';

  const ledgerRows = dailyPnl.map((d, i, arr) => {
    const isLast = i === arr.length - 1;
    return `
      <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border-color)">
        <div>
          <span style="color:var(--text-secondary);font-family:var(--font-mono);font-size:12px">${d.date}</span>
          ${isLast
            ? '<span style="margin-left:6px;font-size:9px;font-weight:600;color:var(--cyan);border:1px solid rgba(126,196,224,0.3);padding:1px 4px;border-radius:3px;font-family:var(--font-mono)">LIVE</span>'
            : '<span style="margin-left:6px;font-size:10px;color:var(--text-muted)">confirmed</span>'}
        </div>
        <div style="text-align:right">
          <div style="font-family:var(--font-mono);font-size:13px;color:var(--text-primary)">$${(d.balanceEnd || 0).toFixed(2)}</div>
          <div style="font-size:11px;font-family:var(--font-mono);color:${pnlCssColor(d.pnl)}">${fmtPnl(d.pnl)}</div>
        </div>
      </div>`;
  }).join('');

  // ── Open issues ───────────────────────────────────────────────────────────
  const issueStatusColor = s => {
    if (!s) return 'var(--text-muted)';
    if (s === 'RESOLVED') return 'var(--success)';
    if (s === 'ACTIVE' || s === 'IN_PROGRESS') return 'var(--cyan)';
    if (s === 'BLOCKED') return 'var(--error)';
    if (s === 'MONITORING') return 'var(--warning)';
    return 'var(--text-muted)';
  };
  const issueRows = openIssues.map(issue => {
    const pc = PC[issue.priority] || 'var(--text-muted)';
    const label = issue.title || issue.label || '';
    const progress = issue.progress || issue.notes || '';
    const updatedAt = issue.updatedAt || issue.lastUpdated || '';
    const updatedStr = updatedAt ? new Date(updatedAt).toLocaleDateString('en-US', {month:'short', day:'numeric'}) : '';
    const sc = issueStatusColor(issue.status);
    return `
      <div style="padding:10px 16px;border-bottom:1px solid var(--border-color)">
        <div style="display:flex;align-items:flex-start;gap:12px">
          <span style="font-size:10px;font-weight:700;font-family:var(--font-mono);color:${pc};min-width:24px;padding-top:2px">${issue.priority}</span>
          <span style="color:var(--text-secondary);font-size:12px;flex:1;line-height:1.5">${label}</span>
          <div style="text-align:right;min-width:80px">
            <div style="font-size:10px;font-family:var(--font-mono);color:${sc};font-weight:600">${issue.status || ''}</div>
            ${updatedStr ? `<div style="font-size:9px;color:var(--text-muted);margin-top:2px">${updatedStr}</div>` : ''}
          </div>
        </div>
        ${progress ? `<div style="margin-top:5px;margin-left:36px;font-size:11px;color:var(--text-muted);line-height:1.5;font-style:italic">${progress}</div>` : ''}
      </div>`;
  }).join('');

  // ── Build full HTML ───────────────────────────────────────────────────────
  const html = `
    <div class="aether-v2">

      <!-- HEADER -->
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;padding-bottom:18px;border-bottom:1px solid var(--border-color)">
        <div>
          <div style="display:flex;align-items:baseline;gap:12px;flex-wrap:wrap">
            <h2 style="margin:0;font-size:18px;font-weight:700;letter-spacing:0.04em;color:var(--cyan);font-family:var(--font-mono)">AETHERBOT</h2>
            <span style="color:var(--text-muted);font-size:12px;font-family:var(--font-mono)">${data.agent || 'aether.hyo'}</span>
            ${(() => {
              const lu = data.lastUpdated || data.updatedAt;
              if (!lu) return `<span style="font-size:9px;font-weight:600;letter-spacing:0.12em;color:var(--text-muted);border:1px solid var(--border-color);padding:2px 8px;border-radius:4px;font-family:var(--font-mono)">UNKNOWN</span>`;
              const ageMs = Date.now() - new Date(lu).getTime();
              const ageH = ageMs / 3600000;
              if (ageH < 6)  return `<span style="font-size:9px;font-weight:600;letter-spacing:0.12em;color:var(--success);border:1px solid rgba(109,212,156,0.30);padding:2px 8px;border-radius:4px;font-family:var(--font-mono)">RUNNING</span>`;
              if (ageH < 24) return `<span style="font-size:9px;font-weight:600;letter-spacing:0.12em;color:var(--warning);border:1px solid rgba(255,204,0,0.30);padding:2px 8px;border-radius:4px;font-family:var(--font-mono)">RECENT · ${Math.floor(ageH)}h ago</span>`;
              return `<span style="font-size:9px;font-weight:600;letter-spacing:0.12em;color:var(--error);border:1px solid rgba(224,112,96,0.30);padding:2px 8px;border-radius:4px;font-family:var(--font-mono)">STALE · ${Math.floor(ageH)}h ago</span>`;
            })()}
          </div>
          <div style="color:var(--text-muted);font-size:11px;margin-top:5px">
            Kalshi · KXBTC15M · ${week.start || ''} – ${week.end || ''} · MTN
            ${(data.lastUpdated || data.updatedAt) ? `<span style="margin-left:10px;opacity:0.7">· Updated: ${new Date(data.lastUpdated || data.updatedAt).toLocaleString('en-US', {month:'short',day:'numeric',hour:'2-digit',minute:'2-digit',timeZoneName:'short'})}</span>` : ''}
          </div>
        </div>
        <div style="text-align:right">
          <div style="font-size:24px;font-weight:700;color:var(--success);letter-spacing:-0.01em;font-family:var(--font-mono)">$${currentBalance.toFixed(2)}</div>
          <div style="color:var(--text-muted);font-size:11px;margin-top:2px">current balance</div>
        </div>
      </div>

      <!-- 5-METRIC ROW -->
      <div class="aether-metric-grid">
        ${[
          { label: '4-Day Net',     value: fmtPnl(totalNet),                        color: pnlCssColor(totalNet) },
          { label: 'Win Rate',      value: overallWR.toFixed(1) + '%',              color: overallWR >= 70 ? 'var(--success)' : 'var(--warning)' },
          { label: 'Total Trades',  value: totalTrades,                              color: 'var(--text-primary)' },
          { label: 'Record',        value: totalWins + 'W / ' + totalLosses + 'L',  color: 'var(--text-secondary)' },
          { label: 'Open Issues',   value: openIssues.length,                        color: openIssues.length > 0 ? 'var(--warning)' : 'var(--text-muted)' },
        ].map(m => `<div class="aether-card" style="border-left:3px solid var(--border-hover)">
          <div style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-muted);margin-bottom:6px">${m.label}</div>
          <div style="font-size:18px;font-weight:700;color:${m.color};font-family:var(--font-mono)">${m.value}</div>
        </div>`).join('')}
      </div>

      <!-- MAIN GRID -->
      <div class="aether-main-grid">

        <!-- LEFT COLUMN -->
        <div>

          <!-- STRATEGY TABLE -->
          <div class="aether-strategies" style="margin-bottom:14px;padding:0">
            <div style="padding:14px 16px;border-bottom:1px solid var(--border-color);display:flex;justify-content:space-between;align-items:center">
              <div>
                <span style="font-size:11px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--text-secondary)">Strategy Performance</span>
                <span style="color:var(--text-muted);font-size:10px;margin-left:8px">click headers to sort</span>
              </div>
              <span style="color:var(--text-muted);font-size:11px;font-family:var(--font-mono)">${totalTrades} trades</span>
            </div>
            <div class="aether-table-scroll">
            <table style="width:100%;border-collapse:collapse;font-size:12px">
              <thead>
                <tr style="background:var(--bg-secondary)">
                  ${sortTH('Family',   'name',   _aetherStratSort, 'aetherSortStrat')}
                  ${sortTH('Trades',   'trades', _aetherStratSort, 'aetherSortStrat')}
                  ${sortTH('Win Rate', 'wr',     _aetherStratSort, 'aetherSortStrat')}
                  <th class="aether-hide-mobile" style="padding:8px 10px;text-align:left;font-weight:500;border-bottom:1px solid var(--border-color);color:var(--text-muted);font-size:10px;text-transform:uppercase;letter-spacing:0.06em">Avg Win</th>
                  <th class="aether-hide-mobile" style="padding:8px 10px;text-align:left;font-weight:500;border-bottom:1px solid var(--border-color);color:var(--text-muted);font-size:10px;text-transform:uppercase;letter-spacing:0.06em">Avg Loss</th>
                  ${sortTH('Net P&amp;L', 'net', _aetherStratSort, 'aetherSortStrat')}
                  <th style="padding:8px 10px;border-bottom:1px solid var(--border-color)"></th>
                  <th class="aether-hide-mobile" style="padding:8px 10px;border-bottom:1px solid var(--border-color)"></th>
                </tr>
              </thead>
              <tbody>
                ${stratRows}
              </tbody>
              <tfoot>
                <tr style="background:var(--bg-secondary);border-top:1px solid var(--border-color)">
                  <td style="padding:10px;color:var(--text-muted);font-size:11px;font-family:var(--font-mono)">TOTAL</td>
                  <td style="padding:10px;color:var(--text-secondary);font-family:var(--font-mono);font-size:12px">${totalTrades}</td>
                  <td style="padding:10px">${wrBar(totalWins, totalWins + totalLosses)}</td>
                  <td class="aether-hide-mobile" colspan="2"></td>
                  <td style="padding:10px">${netCell(totalNet)}</td>
                  <td></td>
                  <td class="aether-hide-mobile"></td>
                </tr>
              </tfoot>
            </table>
            </div>
          </div>

          <!-- SESSION WINDOWS -->
          <div class="aether-strategies" style="margin-bottom:14px;padding:0">
            <div style="padding:14px 16px;border-bottom:1px solid var(--border-color);display:flex;justify-content:space-between;align-items:center">
              <span style="font-size:11px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--text-secondary)">Session Windows · MTN</span>
              <span style="font-size:10px;color:var(--text-muted)">v254 will add per-window P&amp;L</span>
            </div>
            <div class="aether-table-scroll">
            <table style="width:100%;border-collapse:collapse;font-size:12px">
              <thead>
                <tr style="background:var(--bg-secondary)">
                  <th style="padding:8px 10px;text-align:left;font-weight:500;border-bottom:1px solid var(--border-color);color:var(--text-muted);font-size:10px;text-transform:uppercase;letter-spacing:0.06em">Session</th>
                  <th style="padding:8px 10px;text-align:left;font-weight:500;border-bottom:1px solid var(--border-color);color:var(--text-muted);font-size:10px;text-transform:uppercase;letter-spacing:0.06em">Window</th>
                  <th style="padding:8px 10px;text-align:left;font-weight:500;border-bottom:1px solid var(--border-color);color:var(--text-muted);font-size:10px;text-transform:uppercase;letter-spacing:0.06em">Net P&amp;L</th>

<script>
// ═══ IN-APP ARTICLE READER ═══
let _readerUrl = '';

function openReader(url) {
  _readerUrl = url;
  const overlay = document.getElementById('articleReader');
  const content = document.getElementById('articleContent');
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
  if (navigator.vibrate) navigator.vibrate(8);

  content.innerHTML = '<div class="reader-loading">Loading…</div>';

  fetch(url)
    .then(r => { if (!r.ok) throw new Error(r.status); return r.text(); })
    .then(html => {
      const doc = new DOMParser().parseFromString(html, 'text/html');
      // Remove non-content elements
      doc.querySelectorAll('script,style,link,meta,nav,header,footer,.sidebar,.hamburger,.bottom-nav,noscript').forEach(el => el.remove());
      // Find main content container
      const main = doc.querySelector('main, article, .report-body, .content-body, .container, body');
      if (!main) throw new Error('no content');

      // Strip ALL inline styles + class attrs → clean semantic HTML
      main.querySelectorAll('[style]').forEach(el => el.removeAttribute('style'));
      main.querySelectorAll('[class]').forEach(el => el.removeAttribute('class'));
      main.querySelectorAll('[id]').forEach(el => el.removeAttribute('id'));
      // Make sure any links inside the article also open in reader
      main.querySelectorAll('a[href]').forEach(a => {
        const href = a.getAttribute('href');
        if (href && href.startsWith('/') && !href.startsWith('//')) {
          a.setAttribute('data-reader-link', href);
          a.removeAttribute('href'); // prevent browser navigation
          a.style.cursor = 'pointer';
        }
      });

      content.innerHTML = main.innerHTML;
    })
    .catch(() => {
      content.innerHTML = `<div class="reader-error">
        <p>Could not load article.</p>
        <button onclick="openReaderInBrowser()" style="margin-top:12px;padding:10px 20px;background:var(--accent);color:#000;border:none;border-radius:8px;font-weight:600;cursor:pointer">Open in Browser</button>
      </div>`;
    });
}

function closeReader() {
  const overlay = document.getElementById('articleReader');
  overlay.classList.remove('open');
  document.body.style.overflow = '';
  if (navigator.vibrate) navigator.vibrate(6);
}

function openReaderInBrowser() {
  if (_readerUrl) window.open(_readerUrl, '_blank', 'noopener');
}

// Intercept article link clicks — on mobile, open in reader
document.addEventListener('click', function(e) {
  // Handle data-reader-link clicks inside reader content
  const readerLink = e.target.closest('[data-reader-link]');
  if (readerLink) {
    e.preventDefault();
    openReader(readerLink.getAttribute('data-reader-link'));
    return;
  }

  // Only intercept on mobile (touch devices or narrow viewport)
  const isMobile = window.matchMedia('(max-width: 900px)').matches || navigator.maxTouchPoints > 0;
  if (!isMobile) return;

  const link = e.target.closest('a[href]');
  if (!link) return;

  const href = link.getAttribute('href');
  if (!href) return;

  // Only intercept same-origin internal links (starts with /)
  if (!href.startsWith('/') && !href.startsWith(location.origin)) return;

  // Don't intercept mailto, tel, hash links
  if (href.startsWith('//') || href.startsWith('#') || href.startsWith('mailto') || href.startsWith('tel')) return;

  // Don't intercept hq.html itself or the app root
  const path = href.startsWith('/') ? href : new URL(href, location.origin).pathname;
  if (path === '/hq.html' || path === '/' || path === '') return;

  e.preventDefault();
  openReader(path);
}, true);

// Swipe down to close reader
(function() {
  let startY = 0, isDragging = false;
  const reader = document.getElementById('articleReader');
  if (!reader) return;

  reader.addEventListener('touchstart', e => {
    if (reader.scrollTop > 0) return; // only when at top
    startY = e.touches[0].clientY;
    isDragging = true;
  }, { passive: true });

  reader.addEventListener('touchmove', e => {
    if (!isDragging) return;
    const dy = e.touches[0].clientY - startY;
    if (dy > 0) {
      reader.style.transform = `translateY(${dy}px)`;
      reader.style.transition = 'none';
    }
  }, { passive: true });

  reader.addEventListener('touchend', e => {
    if (!isDragging) return;
    isDragging = false;
    const dy = e.changedTouches[0].clientY - startY;
    reader.style.transition = '';
    if (dy > 80) {
      closeReader();
      reader.style.transform = '';
    } else {
      reader.style.transform = '';
    }
  }, { passive: true });
})();

// ═══ ANT — ACCOUNTANT SECTION ═══
// Pulls from /data/ant-data.json (daily updated by ant.sh runner)
// Falls back to graceful "awaiting API key" state if data not yet available

let ANT_DATA = null;

async function loadAntData() {
  if (ANT_DATA) return ANT_DATA;
  try {
    const r = await fetch('/data/ant-data.json?v=' + Date.now());
    if (r.ok) ANT_DATA = await r.json();
  } catch (e) {}
  return ANT_DATA;
}

function antFmt(n, decimals = 2) {
  if (n == null || isNaN(n)) return '—';
  const abs = Math.abs(n);
  const s = abs >= 1000 ? abs.toLocaleString('en-US', {minimumFractionDigits: 0, maximumFractionDigits: 0})
           : abs.toFixed(decimals);
  return (n < 0 ? '-' : '') + '$' + s;
}

function antPct(n) {
  if (n == null || isNaN(n)) return '—';
  return (n >= 0 ? '+' : '') + n.toFixed(1) + '%';
}

function antBar(used, total, color) {
  const pct = total > 0 ? Math.min((used / total) * 100, 100) : 0;
  const remaining = Math.max(total - used, 0);
  const col = pct > 85 ? 'var(--error)' : pct > 60 ? 'var(--warning, #f59e0b)' : color || 'var(--accent)';
  return `
  <div style="margin-top:8px;">
    <div style="background:var(--bg-tertiary);border-radius:4px;height:8px;overflow:hidden;position:relative;">
      <div style="width:${pct.toFixed(1)}%;background:${col};height:100%;border-radius:4px;transition:width 0.4s var(--ease);"></div>
    </div>
    <div style="display:flex;justify-content:space-between;margin-top:5px;">
      <span style="font-size:0.72em;color:var(--text-muted);">${antFmt(used)} used</span>
      <span style="font-size:0.72em;color:var(--text-muted);">${antFmt(remaining)} left of ${antFmt(total)}</span>
    </div>
  </div>`;
}

function antCreditBar(label, used, remaining, total, color, expires) {
  const pct = total > 0 ? Math.min((used / total) * 100, 100) : 0;
  const col = pct > 85 ? 'var(--error)' : pct > 60 ? 'var(--warning, #f59e0b)' : color || 'var(--accent)';
  const remainingPct = (100 - pct).toFixed(1);
  return `
  <div style="margin-bottom:18px;">
    <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;">
      <span style="font-size:0.875em;font-weight:600;color:var(--text-primary);">${label}</span>
      <span style="font-size:1.1em;font-weight:700;color:${col};">$${remaining.toFixed(2)} left</span>
    </div>
    <div style="background:var(--bg-tertiary);border-radius:6px;height:10px;overflow:hidden;position:relative;">
      <div style="width:${pct.toFixed(1)}%;background:${col};height:100%;border-radius:6px;opacity:0.85;transition:width 0.4s var(--ease);"></div>
    </div>
    <div style="display:flex;justify-content:space-between;margin-top:5px;">
      <span style="font-size:0.72em;color:var(--text-muted);">$${used.toFixed(2)} used (${pct.toFixed(1)}%)</span>
      <span style="font-size:0.72em;color:var(--text-muted);">$${total.toFixed(2)} total${expires ? ' · expires ' + expires : ''}</span>
    </div>
  </div>`;
}

function antStatBox(label, value, sub, color) {
  return `<div style="background:var(--bg-card);border:1px solid var(--border-color);border-radius:var(--radius);padding:16px 18px;">
    <div style="font-size:0.72em;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px;">${label}</div>
    <div style="font-size:1.5em;font-weight:700;color:${color || 'var(--text-primary)'};">${value}</div>
    ${sub ? `<div style="font-size:0.78em;color:var(--text-tertiary);margin-top:3px;">${sub}</div>` : ''}
  </div>`;
}

function antSection(title, content) {
  return `<div style="background:var(--bg-card);border:1px solid var(--border-color);border-radius:var(--radius);padding:20px;margin-bottom:14px;">
    <div style="font-size:0.72em;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:14px;">${title}</div>
    ${content}
  </div>`;
}

async function renderAnt(container) {
  container.innerHTML = `<div style="padding:20px;text-align:center;color:var(--text-tertiary);">Loading financials...</div>`;

  const data = await loadAntData();

  const today = new Date().toISOString().slice(0, 10);

  // If no API key yet or data unavailable, show setup state
  if (!data || data.status === 'awaiting_key') {
    container.innerHTML = `
      <div class="main-header">
        <h1>🐜 Ant</h1>
        <div class="sub">Accountant — cost tracking &amp; revenue</div>
      </div>
      <div style="padding:0 16px 100px;">
        ${antSection('Status', `
          <div style="text-align:center;padding:20px 0;">
            <div style="font-size:2em;margin-bottom:12px;">🔑</div>
            <div style="font-weight:600;color:var(--text-primary);margin-bottom:8px;">Awaiting Anthropic Admin API Key</div>
            <div style="font-size:0.85em;color:var(--text-secondary);line-height:1.6;">
              To activate live cost tracking:<br>
              console.anthropic.com → Settings → API Keys → Admin Keys<br>
              Send key via HQ → Message Kai
            </div>
          </div>
        `)}
        ${antSection('What Ant will track', `
          <div style="display:grid;gap:8px;">
            ${['Daily Anthropic API spend by model (Opus / Sonnet / Haiku)',
               'Daily OpenAI API spend (GPT-4o usage)',
               'Credits remaining + days until depletion at current burn',
               'Monthly burn rate vs budget',
               'Revenue tracking (AetherBot + future streams)',
               'Net position — in the hole or profit',
               '7-day and 30-day cost trend charts',
               'Cost per agent per day (which agent is most expensive)'
              ].map(item => `<div style="display:flex;gap:10px;align-items:flex-start;font-size:0.875em;color:var(--text-secondary);">
                <span style="color:var(--success);flex-shrink:0;">✓</span><span>${item}</span>
              </div>`).join('')}
          </div>
        `)}
      </div>`;
    return;
  }

  // Full dashboard with real data
  const costs = data.costs || {};
  const revenue = data.revenue || {};
  const credits = data.credits || {};
  const burn = data.burn || {};

  // costs.today is a flat number in ant-data.json (new format) or object (old format)
  const todayCost = (typeof costs.today === 'object' && costs.today !== null) ? costs.today : {};
  const totalToday = typeof costs.today === 'number' ? costs.today :
    (todayCost.anthropic || 0) + (todayCost.openai || 0);
  const monthCost = costs.month || {};
  const totalAPICosts = (monthCost.anthropic || 0) + (monthCost.openai || 0) ||
    ((costs.anthropic || {}).total || 0) + ((costs.openai || {}).total || 0);

  // Sum ALL expenses (subscriptions + API + infra + other) for true total burn
  const expData = data.expenses || {};
  const allExpItems = [
    ...(expData.subscriptions || []),
    ...(expData.api || []),
    ...(expData.infrastructure || []),
    ...(expData.other || [])
  ];
  const totalAllExpenses = allExpItems.length > 0
    ? allExpItems.reduce((s, e) => s + (e.actual || 0), 0)
    : totalAPICosts;

  const incomeData = data.income || {};
  const totalIncomeMTD = incomeData.total_monthly || revenue.monthly || 0;

  const netMonthly = totalIncomeMTD - totalAllExpenses;
  const netColor = netMonthly >= 0 ? 'var(--success)' : 'var(--error)';

  // ── HEADER ──
  let html = `
    <div class="main-header">
      <h1>🐜 Ant</h1>
      <div class="sub">Accountant · updated ${data.updatedAt ? data.updatedAt.slice(0, 10) : today}</div>
    </div>
    <div style="padding:0 16px 100px;">
  `;

  // ── EXPENSES / INCOME / NET ──
  const incomeStreams = (incomeData.streams || []);
  const tradingStream = incomeStreams.find(s => s.name && s.name.includes('Aether'));
  const incomeSubLabel = tradingStream
    ? 'AetherBot trading · balance ' + antFmt(tradingStream.balance || 0)
    : 'AetherBot trading';
  const expSubLabel = 'Claude Max $200 · GPT Plus $20 · API ' + antFmt(expData.total_api || 0);

  html += `<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px;">
    ${antStatBox('Expenses', antFmt(totalAllExpenses), expSubLabel, 'var(--error)')}
    ${antStatBox('Income', antFmt(totalIncomeMTD), incomeSubLabel, totalIncomeMTD >= 0 ? 'var(--success)' : 'var(--error)')}
    ${antStatBox('Net', antFmt(netMonthly), netMonthly >= 0 ? 'profitable' : 'expenses exceed income', netColor)}
  </div>`;

  // ── CREDIT BALANCES (horizontal bars) ──
  const antCred = credits.anthropic || {};
  const oaiCred = credits.openai || {};
  const hasAntCred = antCred.remaining != null && antCred.total != null;
  const hasOaiCred = oaiCred.remaining != null && oaiCred.total != null;

  if (hasAntCred || hasOaiCred) {
    const antDaysLeft = hasAntCred && burn.daily > 0 ? Math.floor(antCred.remaining / burn.daily) : null;
    const oaiDaysLeft = hasOaiCred && burn.daily > 0 ? Math.floor(oaiCred.remaining / burn.daily) : null;
    html += antSection('Credit Balances', `
      ${hasAntCred ? antCreditBar(
        'Anthropic',
        antCred.used || (antCred.total - antCred.remaining),
        antCred.remaining,
        antCred.total,
        'var(--purple)',
        antCred.expires
      ) + (antDaysLeft ? `<div style="font-size:0.72em;color:var(--text-muted);margin-top:-10px;margin-bottom:14px;">~${antDaysLeft} days at current burn rate</div>` : '') : ''}
      ${hasOaiCred ? antCreditBar(
        'OpenAI',
        oaiCred.used || (oaiCred.total - oaiCred.remaining),
        oaiCred.remaining,
        oaiCred.total,
        'var(--cyan)',
        null
      ) + (oaiDaysLeft ? `<div style="font-size:0.72em;color:var(--text-muted);margin-top:-10px;">~${oaiDaysLeft} days at current burn rate</div>` : '') : ''}
    `);
  }

  // ── TODAY'S BREAKDOWN ──
  html += antSection("Today's API Costs", `
    <div style="display:grid;gap:8px;">
      <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border-color);">
        <div>
          <div style="font-size:0.875em;font-weight:600;">Anthropic</div>
          ${(todayCost.byModel || []).map(m => `<div style="font-size:0.75em;color:var(--text-muted);">${m.model}: ${antFmt(m.cost)}</div>`).join('')}
        </div>
        <div style="font-weight:700;color:var(--purple);">${antFmt(todayCost.anthropic || 0)}</div>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;">
        <div>
          <div style="font-size:0.875em;font-weight:600;">OpenAI</div>
          ${(todayCost.openaiByModel || []).map(m => `<div style="font-size:0.75em;color:var(--text-muted);">${m.model}: ${antFmt(m.cost)}</div>`).join('')}
        </div>
        <div style="font-weight:700;color:var(--cyan);">${antFmt(todayCost.openai || 0)}</div>
      </div>
    </div>
    <div style="border-top:1px solid var(--border-color);padding-top:10px;margin-top:4px;display:flex;justify-content:space-between;align-items:center;">
      <span style="font-weight:600;">Total</span>
      <span style="font-size:1.1em;font-weight:700;">${antFmt(totalToday)}</span>
    </div>
  `);

  // ── DAILY CREDIT USAGE (14 days) — reads from data.history (top-level) ──
  // Field was previously read from costs.dailyHistory (wrong path — never rendered).
  // Fixed 2026-04-18: now reads data.history which is the correct field from ant-update.sh.
  const dailyHist = data.history || [];
  if (dailyHist.length > 0) {
    const hist = dailyHist.slice(-14);
    const maxCost = Math.max(...hist.map(d => (d.anthropic || 0) + (d.openai || 0)), 0.01);
    const bars = hist.map(d => {
      const antAmt  = d.anthropic || 0;
      const oaiAmt  = d.openai    || 0;
      const total   = antAmt + oaiAmt;
      const antPct  = (antAmt / maxCost) * 100;
      const oaiPct  = (oaiAmt / maxCost) * 100;
      const label   = d.date ? d.date.slice(5) : '';
      const hasData = total > 0;
      return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;">
        <div style="font-size:0.60em;color:${hasData ? 'var(--text-primary)' : 'var(--text-muted)'};">${hasData ? '$' + total.toFixed(2) : ''}</div>
        <div style="width:100%;background:var(--bg-tertiary);border-radius:3px;height:52px;display:flex;flex-direction:column;justify-content:flex-end;overflow:hidden;">
          <div style="width:100%;height:${Math.max(oaiPct, hasData ? 2 : 0).toFixed(1)}%;background:var(--cyan, #22d3ee);opacity:0.85;min-height:${oaiAmt > 0 ? 2 : 0}px;"></div>
          <div style="width:100%;height:${Math.max(antPct, hasData ? 2 : 0).toFixed(1)}%;background:var(--purple, #a855f7);opacity:0.85;min-height:${antAmt > 0 ? 2 : 0}px;border-radius:3px 3px 0 0;"></div>
        </div>
        <div style="font-size:0.60em;color:var(--text-muted);">${label}</div>
      </div>`;
    }).join('');
    html += antSection('Daily Credit Usage', `
      <div style="display:flex;gap:2px;align-items:flex-end;margin-bottom:10px;">${bars}</div>
      <div style="display:flex;gap:14px;font-size:0.72em;color:var(--text-muted);">
        <span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:var(--purple,#a855f7);opacity:0.85;margin-right:4px;vertical-align:middle;"></span>Anthropic</span>
        <span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:var(--cyan,#22d3ee);opacity:0.85;margin-right:4px;vertical-align:middle;"></span>OpenAI</span>
        <span style="margin-left:auto;">stacked by provider · last 14 days</span>
      </div>
    `);
  }

  // ── ALERTS ──
  const alerts = data.alerts || [];
  if (alerts.length > 0) {
    const alertHtml = alerts.map(a => `
      <div style="display:flex;align-items:flex-start;gap:10px;padding:10px 12px;background:rgba(220,60,40,0.08);border:1px solid rgba(220,60,40,0.25);border-radius:8px;margin-bottom:8px;">
        <span style="font-size:1.1em;">⚠️</span>
        <div>
          <div style="font-size:0.8em;font-weight:700;color:var(--error);">${a.level || 'WARNING'}</div>
          <div style="font-size:0.82em;color:var(--text-primary);margin-top:2px;">${a.msg}</div>
        </div>
      </div>`).join('');
    html += antSection('🚨 Budget Alerts', alertHtml);
  }

  // ── STALENESS INDICATOR ──
  const staleness = data.staleness || {};
  if (staleness.lastUpdated) {
    const lastUp = new Date(staleness.lastUpdated);
    const ageHours = (Date.now() - lastUp.getTime()) / 3600000;
    const staleAfter = staleness.staleAfterHours || 24;
    const isStale = ageHours > staleAfter;
    const staleColor = isStale ? 'var(--error)' : ageHours > staleAfter * 0.75 ? 'var(--warning)' : 'var(--success)';
    const staleLabel = isStale ? `STALE (${ageHours.toFixed(0)}h old — run ant-update.sh)` : `Fresh (${ageHours.toFixed(1)}h ago)`;
    html += `<div style="display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--bg-secondary);border-radius:8px;margin-bottom:14px;border:1px solid var(--border-color);">
      <div style="width:8px;height:8px;border-radius:50%;background:${staleColor};flex-shrink:0;"></div>
      <div style="font-size:0.78em;color:var(--text-muted);">Ant data: <span style="color:${staleColor};font-weight:600;">${staleLabel}</span></div>
    </div>`;
  }

  // ── COST PER PROCESS (byProcess) ──
  const byProcess = data.byProcess || [];
  if (byProcess.length > 0) {
    const maxCost = byProcess[0].totalCost || 0.01;
    const processRows = byProcess.map(p => {
      const pct = (p.totalCost / maxCost) * 100;
      const lastRun = p.lastRun ? p.lastRun.slice(0, 16).replace('T', ' ') : '—';
      const avgColor = p.avgPerRun > 0.50 ? 'var(--error)' : p.avgPerRun > 0.10 ? 'var(--warning)' : 'var(--text-secondary)';
      return `<div style="margin-bottom:12px;">
        <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:4px;">
          <span style="font-size:0.875em;font-weight:600;">${p.process}</span>
          <div style="text-align:right;">
            <span style="font-size:0.875em;font-weight:700;">${antFmt(p.totalCost)}</span>
            <span style="font-size:0.72em;color:${avgColor};margin-left:6px;">${antFmt(p.avgPerRun)}/run · ${p.runs} runs</span>
          </div>
        </div>
        <div style="background:var(--bg-tertiary);border-radius:3px;height:4px;margin-bottom:3px;">
          <div style="width:${pct.toFixed(0)}%;background:var(--accent);height:100%;border-radius:3px;opacity:0.8;"></div>
        </div>
        <div style="font-size:0.68em;color:var(--text-muted);">Last run: ${lastRun}</div>
      </div>`;
    }).join('');
    html += antSection('Cost per Process', processRows);
  }

  // ── COST PER AGENT (MTD) — legacy byAgent field ──
  if (costs.byAgent && Object.keys(costs.byAgent).length > 0) {
    const agents = Object.entries(costs.byAgent).sort((a, b) => b[1] - a[1]);
    const maxAgent = agents[0]?.[1] || 0.01;
    const agentRows = agents.map(([name, cost]) => {
      const pct = (cost / maxAgent) * 100;
      return `<div style="margin-bottom:10px;">
        <div style="display:flex;justify-content:space-between;margin-bottom:4px;">
          <span style="font-size:0.875em;font-weight:500;">${name}</span>
          <span style="font-size:0.875em;font-weight:600;">${antFmt(cost)} MTD</span>
        </div>
        <div style="background:var(--bg-tertiary);border-radius:3px;height:4px;">
          <div style="width:${pct.toFixed(0)}%;background:var(--accent);height:100%;border-radius:3px;"></div>
        </div>
      </div>`;
    }).join('');
    html += antSection('Cost per Agent (total)', agentRows);
  }

  // ── EXPENSES ──
  const expenses = data.expenses || {};
  const subItems = expenses.subscriptions || [];
  const apiItems = expenses.api || [];
  const infraItems = expenses.infrastructure || [];
  const otherItems = expenses.other || [];
  const allExpenses = [...subItems, ...apiItems, ...infraItems, ...otherItems];

  if (allExpenses.length > 0) {
    const totalExpenses = allExpenses.reduce((s, e) => s + (e.actual || 0), 0);
    const expRows = allExpenses.map(e => {
      const pct = e.budget > 0 ? Math.min((e.actual / e.budget) * 100, 100) : 0;
      const isSub = e.category === 'subscription';
      const col = isSub ? 'var(--accent)' : pct > 85 ? 'var(--error)' : pct > 60 ? 'var(--warning)' : 'var(--text-secondary)';
      const billingTag = e.billingDay ? `<span style="font-size:0.68em;padding:1px 5px;border-radius:8px;background:var(--accent-bg);color:var(--accent);margin-left:6px;">bills ${e.billingDay}th</span>` : '';
      return `<div style="padding:8px 0;border-bottom:1px solid var(--border-color);">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
          <span style="font-size:0.875em;font-weight:600;color:var(--text-primary);">${e.name}${billingTag}</span>
          <span style="font-size:0.875em;font-weight:700;color:${e.actual > 0 ? (isSub ? 'var(--accent)' : 'var(--error)') : 'var(--text-muted)'};">${antFmt(e.actual)}</span>
        </div>
        ${e.budget > 0 ? `<div style="background:var(--bg-tertiary);border-radius:3px;height:4px;margin-bottom:4px;">
          <div style="width:${pct.toFixed(0)}%;background:${col};height:100%;border-radius:3px;opacity:0.85;"></div>
        </div>` : ''}
        <div style="font-size:0.68em;color:var(--text-muted);">${e.note || ''}</div>
      </div>`;
    }).join('');
    html += antSection('Monthly Expenses', `
      ${expRows}
      <div style="display:flex;justify-content:space-between;align-items:center;padding-top:10px;">
        <span style="font-weight:600;">Total MTD</span>
        <span style="font-size:1.1em;font-weight:700;color:var(--error);">${antFmt(totalExpenses)}</span>
      </div>
    `);
  }

  // ── INCOME / REVENUE STREAMS ──
  // Note: incomeStreams already declared above (line ~2769) from data.income.streams
  const totalIncome = incomeData.total_monthly || revenue.monthly || 0;

  html += antSection('Income', `
    <div style="display:grid;gap:4px;">
      ${incomeStreams.length > 0 ? incomeStreams.map(s => {
        const amt = s.monthly != null ? s.monthly : (s.amount || 0);
        const statusColor = s.status === 'active' ? 'var(--success)' : s.status === 'pre-launch' ? 'var(--warning)' : 'var(--text-muted)';
        return `<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border-color);">
          <div>
            <div style="font-size:0.875em;font-weight:600;">${s.name}</div>
            <div style="display:flex;gap:8px;align-items:center;margin-top:2px;">
              <span style="font-size:0.68em;padding:2px 6px;border-radius:10px;background:var(--bg-tertiary);color:${statusColor};font-weight:600;">${s.status || 'planned'}</span>
              <span style="font-size:0.72em;color:var(--text-muted);">${s.note || ''}</span>
            </div>
          </div>
          <div style="font-weight:700;color:${amt > 0 ? 'var(--success)' : 'var(--text-muted)'};">${amt > 0 ? antFmt(amt) : '—'}</div>
        </div>`;
      }).join('') : `<div style="font-size:0.875em;color:var(--text-muted);padding:8px 0;">No active revenue streams — this is the mission.</div>`}
      <div style="display:flex;justify-content:space-between;align-items:center;padding-top:10px;">
        <span style="font-weight:600;">Total Income MTD</span>
        <span style="font-size:1.1em;font-weight:700;color:${totalIncome > 0 ? 'var(--success)' : 'var(--text-muted)'};">${totalIncome > 0 ? antFmt(totalIncome) : '$0.00'}</span>
      </div>
    </div>
  `);

  html += '</div>';
  container.innerHTML = html;
}
</script>
<script>
  // Service worker registration — enables offline + "Add to Home Screen"
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js', { scope: '/' })
      .catch(() => {}); // Silent fail — doesn't break anything
  }
</script>
</body>
</html>
