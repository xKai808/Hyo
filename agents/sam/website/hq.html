  // ── Helpers (all colors via CSS variables) ────────────────────────────────
  const pnlCssColor = v => v > 0 ? 'var(--success)' : v < 0 ? 'var(--error)' : 'var(--text-muted)';
  // SVG can't resolve CSS vars in presentation attrs — use site's actual hex values
  const pnlSvgColor = v => v >= 0 ? '#6dd49c' : '#e07060';
  const fmtPnl = v => v == null ? '—' : (v >= 0 ? '+' : '') + '$' + Math.abs(v).toFixed(2);

  // Status badge styles using site color tokens
  const SC = {
    ACTIVE:  { bg: 'rgba(109,212,156,0.10)', border: 'rgba(109,212,156,0.30)', text: 'var(--success)' },
    WATCH:   { bg: 'rgba(232,201,106,0.10)', border: 'rgba(232,201,106,0.30)', text: 'var(--warning)' },
    ALERT:   { bg: 'rgba(224,112,96,0.10)',  border: 'rgba(224,112,96,0.30)',  text: 'var(--error)' },
    MONITOR: { bg: 'rgba(126,196,224,0.10)', border: 'rgba(126,196,224,0.30)', text: 'var(--cyan)' },
  };
  // Priority colors — P0 = error, P1 = between error/warning, P2 = warning, P3 = muted
  const PC = {
    P0: 'var(--error)',
    P1: 'var(--warning)',
    P2: 'var(--accent)',
    P3: 'var(--text-muted)',
  };

  function deriveStatus(s) {
    if (s.winRate < 40 || s.pnl < -5) return 'ALERT';
    if (s.winRate < 60 || s.pnl < 0) return 'WATCH';
    if (s.trades < 5) return 'MONITOR';
    return 'ACTIVE';
  }

  function wrBar(wins, total) {
    const wr = total === 0 ? 0 : (wins / total) * 100;
    const col = wr >= 75 ? 'var(--success)' : wr >= 60 ? 'var(--warning)' : 'var(--error)';
    return `<div style="display:flex;align-items:center;gap:8px">
      <div style="width:72px;height:5px;background:var(--bg-tertiary);border-radius:3px;overflow:hidden">
        <div style="width:${wr.toFixed(1)}%;height:100%;background:${col};border-radius:3px;transition:width 0.4s"></div>
      </div>
      <span style="color:${col};font-family:var(--font-mono);font-size:11px;min-width:32px">${Math.round(wr)}%</span>
    </div>`;
  }

  function statusBadge(status) {
    const c = SC[status] || SC.MONITOR;
    return `<span style="padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;letter-spacing:0.06em;font-family:var(--font-mono);background:${c.bg};border:1px solid ${c.border};color:${c.text}">${status}</span>`;
  }

  function netCell(v) {
    return `<span style="color:${pnlCssColor(v)};font-family:var(--font-mono);font-weight:600;font-size:13px">${fmtPnl(v)}</span>`;
  }

  function sparkline(pts) {
    if (!pts || pts.length < 2) return '';
    const mn = Math.min(...pts), mx = Math.max(...pts), rng = mx - mn || 1;
    const W = 52, H = 18;
    const coords = pts.map((v, i) => `${((i / (pts.length - 1)) * W).toFixed(1)},${(H - ((v - mn) / rng) * H).toFixed(1)}`).join(' ');
    const dots = pts.map((v, i) => `<circle cx="${((i / (pts.length - 1)) * W).toFixed(1)}" cy="${(H - ((v - mn) / rng) * H).toFixed(1)}" r="2" fill="${pnlSvgColor(v)}"/>`).join('');
    // stroke uses site success hex with alpha
    return `<svg width="${W}" height="${H}" style="overflow:visible;display:block"><polyline points="${coords}" fill="none" stroke="#6dd49c66" stroke-width="1.5"/>${dots}</svg>`;
  }

  function sortTH(label, key, currentSort, fn) {
    const active = currentSort === key;
    return `<th style="padding:8px 10px;text-align:left;font-weight:500;border-bottom:1px solid var(--border-color)">
      <span onclick="${fn}('${key}')" style="cursor:pointer;color:${active ? 'var(--accent)' : 'var(--text-muted)'};font-size:10px;font-family:var(--font-mono);letter-spacing:0.06em;user-select:none;text-transform:uppercase">
        ${label}${active ? ' ↓' : ''}
      </span>
    </th>`;
  }

  // ── Enriched strategies ───────────────────────────────────────────────────
  const enriched = strategies.map(s => ({
    ...s,
    derivedStatus: deriveStatus(s),
    sparkPts: dailyPnl.map(d => ((d.strategies || {})[s.name] || {}).pnl || 0)
  }));

  const sortedStrats = [...enriched].sort((a, b) => {
    if (_aetherStratSort === 'net')    return b.pnl - a.pnl;
    if (_aetherStratSort === 'wr')     return b.winRate - a.winRate;
    if (_aetherStratSort === 'trades') return b.trades - a.trades;
    return 0;
  });

  // ── Top-level metrics ─────────────────────────────────────────────────────
  const totalNet = week.pnl || 0;
  const currentBalance = week.currentBalance || 0;
  const overallWR = week.winRate || 0;
  const totalTrades = week.trades || 0;
  const totalWins = week.wins || 0;
  const totalLosses = week.losses || 0;

  // ── Strategy rows ─────────────────────────────────────────────────────────
  const stratRows = sortedStrats.map((s, i) => `
    <tr style="border-bottom:1px solid var(--border-color)">
      <td style="padding:10px 10px">
        <div style="font-family:var(--font-mono);font-size:12px;color:var(--text-primary);font-weight:500">${s.name}</div>
      </td>
      <td style="padding:10px 10px">
        <div style="color:var(--text-secondary);font-family:var(--font-mono);font-size:12px">${s.trades}</div>
        <div style="color:var(--text-muted);font-size:10px;margin-top:2px">${s.wins}W / ${s.losses}L</div>
      </td>
      <td style="padding:10px 10px">${wrBar(s.wins, s.trades)}</td>
      <td class="aether-hide-mobile" style="padding:10px 10px"><span style="color:var(--text-muted);font-family:var(--font-mono);font-size:12px">—</span></td>
      <td class="aether-hide-mobile" style="padding:10px 10px"><span style="color:var(--text-muted);font-family:var(--font-mono);font-size:12px">—</span></td>
      <td style="padding:10px 10px">${netCell(s.pnl)}</td>
      <td style="padding:10px 10px">${statusBadge(s.derivedStatus)}</td>
      <td class="aether-hide-mobile" style="padding:10px 10px;width:64px;opacity:0.85">${s.trades >= 2 ? sparkline(s.sparkPts) : ''}</td>
    </tr>`).join('');

  // ── Daily feed cards ──────────────────────────────────────────────────────
  const feedCards = [...dailyPnl].reverse().map((d, i) => {
    const isPos = d.pnl >= 0;
    const isSelected = _aetherSelectedDay === i;
    const isLast = i === 0;
    const accentBorder = isLast ? 'var(--cyan)' : isPos ? 'var(--success)' : 'var(--error)';
    const stratBreakdown = Object.entries(d.strategies || {}).map(([sn, sv]) =>
      `<div style="display:flex;justify-content:space-between;padding:3px 0;font-size:11px;font-family:var(--font-mono)"><span style="color:var(--text-muted)">${sn}</span><span style="color:${pnlCssColor(sv.pnl)}">${fmtPnl(sv.pnl)}</span></div>`
    ).join('');
    return `
      <div onclick="aetherToggleDay(${i})" style="background:${isSelected ? 'var(--bg-tertiary)' : 'var(--bg-secondary)'};border:1px solid ${isSelected ? 'var(--border-hover)' : 'var(--border-color)'};border-left:3px solid ${accentBorder};border-radius:var(--radius-sm);padding:12px 14px;cursor:pointer;margin-bottom:8px;transition:all 0.2s">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <div>
            <span style="color:var(--text-muted);font-family:var(--font-mono);font-size:11px">${d.day || ''}</span>
            <span style="color:var(--text-secondary);font-size:12px;margin-left:6px">${d.date}</span>
            ${isLast ? '<span style="margin-left:8px;font-size:9px;font-weight:600;color:var(--cyan);border:1px solid rgba(126,196,224,0.3);border-radius:3px;padding:1px 5px;font-family:var(--font-mono)">LIVE</span>' : ''}
          </div>
          <div style="text-align:right">
            <div style="color:${pnlCssColor(d.pnl)};font-family:var(--font-mono);font-weight:600;font-size:14px">${fmtPnl(d.pnl)}</div>
            <div style="color:var(--text-muted);font-size:11px;margin-top:1px">${d.trades} trades</div>
          </div>
        </div>
        ${isSelected ? `<div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border-color)">
          <div style="display:flex;gap:20px;margin-bottom:10px">
            <div>
              <div style="color:var(--text-muted);font-size:10px;font-family:var(--font-mono);text-transform:uppercase;margin-bottom:2px">Open</div>
              <div style="color:var(--text-secondary);font-family:var(--font-mono);font-size:12px">$${(d.balanceStart || 0).toFixed(2)}</div>
            </div>
            <div>
              <div style="color:var(--text-muted);font-size:10px;font-family:var(--font-mono);text-transform:uppercase;margin-bottom:2px">Close</div>
              <div style="color:var(--text-secondary);font-family:var(--font-mono);font-size:12px">$${(d.balanceEnd || 0).toFixed(2)}</div>
            </div>
            <div>
              <div style="color:var(--text-muted);font-size:10px;font-family:var(--font-mono);text-transform:uppercase;margin-bottom:2px">Win Rate</div>
              <div style="color:var(--text-secondary);font-family:var(--font-mono);font-size:12px">${(d.winRate || 0).toFixed(1)}%</div>
            </div>
          </div>
          <div style="color:var(--text-muted);font-size:10px;font-family:var(--font-mono);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px">Strategy Breakdown</div>
          ${stratBreakdown || '<div style="color:var(--text-muted);font-size:11px">no breakdown available</div>'}
        </div>` : ''}
      </div>`;
  }).join('');

  // ── Balance ledger ────────────────────────────────────────────────────────
  const startEntry = week.startingBalance ? `
    <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border-color)">
      <div>
        <span style="color:var(--text-tertiary);font-family:var(--font-mono);font-size:12px">${week.start || 'Week Start'}</span>
        <span style="margin-left:6px;font-size:10px;color:var(--text-muted);font-family:var(--font-mono)">start</span>
      </div>
      <div style="text-align:right">
        <div style="font-family:var(--font-mono);font-size:13px;color:var(--text-secondary)">$${(week.startingBalance || 0).toFixed(2)}</div>
      </div>
    </div>` : '';

  const ledgerRows = dailyPnl.map((d, i, arr) => {
    const isLast = i === arr.length - 1;
    return `
      <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border-color)">
        <div>
          <span style="color:var(--text-secondary);font-family:var(--font-mono);font-size:12px">${d.date}</span>
          ${isLast
            ? '<span style="margin-left:6px;font-size:9px;font-weight:600;color:var(--cyan);border:1px solid rgba(126,196,224,0.3);padding:1px 4px;border-radius:3px;font-family:var(--font-mono)">LIVE</span>'
            : '<span style="margin-left:6px;font-size:10px;color:var(--text-muted)">confirmed</span>'}
        </div>
        <div style="text-align:right">
          <div style="font-family:var(--font-mono);font-size:13px;color:var(--text-primary)">$${(d.balanceEnd || 0).toFixed(2)}</div>
          <div style="font-size:11px;font-family:var(--font-mono);color:${pnlCssColor(d.pnl)}">${fmtPnl(d.pnl)}</div>
        </div>
      </div>`;
  }).join('');

  // ── Open issues ───────────────────────────────────────────────────────────
  const issueRows = openIssues.map(issue => {
    const pc = PC[issue.priority] || 'var(--text-muted)';
    const label = issue.title || issue.label || '';
    return `
      <div style="display:flex;align-items:flex-start;gap:12px;padding:10px 16px;border-bottom:1px solid var(--border-color)">
        <span style="font-size:10px;font-weight:700;font-family:var(--font-mono);color:${pc};min-width:24px;padding-top:2px">${issue.priority}</span>
        <span style="color:var(--text-secondary);font-size:12px;flex:1;line-height:1.5">${label}</span>
        <span style="font-size:10px;font-family:var(--font-mono);color:${issue.status === 'ACTIVE' ? 'var(--cyan)' : 'var(--text-muted)'};min-width:70px;text-align:right">${issue.status || ''}</span>
      </div>`;
  }).join('');

  // ── Build full HTML ───────────────────────────────────────────────────────
  const html = `
    <div class="aether-v2">

      <!-- HEADER -->
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;padding-bottom:18px;border-bottom:1px solid var(--border-color)">
        <div>
          <div style="display:flex;align-items:baseline;gap:12px;flex-wrap:wrap">
            <h2 style="margin:0;font-size:18px;font-weight:700;letter-spacing:0.04em;color:var(--cyan);font-family:var(--font-mono)">AETHERBOT</h2>
            <span style="color:var(--text-muted);font-size:12px;font-family:var(--font-mono)">${data.agent || 'aether.hyo'}</span>
            <span style="font-size:9px;font-weight:600;letter-spacing:0.12em;color:var(--success);border:1px solid rgba(109,212,156,0.30);padding:2px 8px;border-radius:4px;font-family:var(--font-mono)">RUNNING</span>
          </div>
          <div style="color:var(--text-muted);font-size:11px;margin-top:5px">Kalshi · KXBTC15M · ${week.start || ''} – ${week.end || ''} · MTN</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:24px;font-weight:700;color:var(--success);letter-spacing:-0.01em;font-family:var(--font-mono)">$${currentBalance.toFixed(2)}</div>
          <div style="color:var(--text-muted);font-size:11px;margin-top:2px">current balance</div>
        </div>
      </div>

      <!-- 5-METRIC ROW -->
      <div class="aether-metric-grid">
        ${[
          { label: '4-Day Net',     value: fmtPnl(totalNet),                        color: pnlCssColor(totalNet) },
          { label: 'Win Rate',      value: overallWR.toFixed(1) + '%',              color: overallWR >= 70 ? 'var(--success)' : 'var(--warning)' },
          { label: 'Total Trades',  value: totalTrades,                              color: 'var(--text-primary)' },
          { label: 'Record',        value: totalWins + 'W / ' + totalLosses + 'L',  color: 'var(--text-secondary)' },
          { label: 'Open Issues',   value: openIssues.length,                        color: openIssues.length > 0 ? 'var(--warning)' : 'var(--text-muted)' },
        ].map(m => `<div class="aether-card" style="border-left:3px solid var(--border-hover)">
          <div style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-muted);margin-bottom:6px">${m.label}</div>
          <div style="font-size:18px;font-weight:700;color:${m.color};font-family:var(--font-mono)">${m.value}</div>
        </div>`).join('')}
      </div>

      <!-- MAIN GRID -->
      <div class="aether-main-grid">

        <!-- LEFT COLUMN -->
        <div>

          <!-- STRATEGY TABLE -->
          <div class="aether-strategies" style="margin-bottom:14px;padding:0">
            <div style="padding:14px 16px;border-bottom:1px solid var(--border-color);display:flex;justify-content:space-between;align-items:center">
              <div>
                <span style="font-size:11px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--text-secondary)">Strategy Performance</span>
                <span style="color:var(--text-muted);font-size:10px;margin-left:8px">click headers to sort</span>
              </div>
              <span style="color:var(--text-muted);font-size:11px;font-family:var(--font-mono)">${totalTrades} trades</span>
            </div>
            <div class="aether-table-scroll">
            <table style="width:100%;border-collapse:collapse;font-size:12px">
              <thead>
                <tr style="background:var(--bg-secondary)">
                  ${sortTH('Family',   'name',   _aetherStratSort, 'aetherSortStrat')}
                  ${sortTH('Trades',   'trades', _aetherStratSort, 'aetherSortStrat')}
                  ${sortTH('Win Rate', 'wr',     _aetherStratSort, 'aetherSortStrat')}
                  <th class="aether-hide-mobile" style="padding:8px 10px;text-align:left;font-weight:500;border-bottom:1px solid var(--border-color);color:var(--text-muted);font-size:10px;text-transform:uppercase;letter-spacing:0.06em">Avg Win</th>
                  <th class="aether-hide-mobile" style="padding:8px 10px;text-align:left;font-weight:500;border-bottom:1px solid var(--border-color);color:var(--text-muted);font-size:10px;text-transform:uppercase;letter-spacing:0.06em">Avg Loss</th>
                  ${sortTH('Net P&amp;L', 'net', _aetherStratSort, 'aetherSortStrat')}
                  <th style="padding:8px 10px;border-bottom:1px solid var(--border-color)"></th>
                  <th class="aether-hide-mobile" style="padding:8px 10px;border-bottom:1px solid var(--border-color)"></th>
                </tr>
              </thead>
              <tbody>
                ${stratRows}
              </tbody>
              <tfoot>
                <tr style="background:var(--bg-secondary);border-top:1px solid var(--border-color)">
                  <td style="padding:10px;color:var(--text-muted);font-size:11px;font-family:var(--font-mono)">TOTAL</td>
                  <td style="padding:10px;color:var(--text-secondary);font-family:var(--font-mono);font-size:12px">${totalTrades}</td>
                  <td style="padding:10px">${wrBar(totalWins, totalWins + totalLosses)}</td>
                  <td class="aether-hide-mobile" colspan="2"></td>
                  <td style="padding:10px">${netCell(totalNet)}</td>
                  <td></td>
                  <td class="aether-hide-mobile"></td>
                </tr>
              </tfoot>
            </table>
            </div>
          </div>

          <!-- SESSION WINDOWS -->
          <div class="aether-strategies" style="margin-bottom:14px;padding:0">
            <div style="padding:14px 16px;border-bottom:1px solid var(--border-color);display:flex;justify-content:space-between;align-items:center">
              <span style="font-size:11px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--text-secondary)">Session Windows · MTN</span>
              <span style="font-size:10px;color:var(--text-muted)">v254 will add per-window P&amp;L</span>
            </div>
            <div class="aether-table-scroll">
            <table style="width:100%;border-collapse:collapse;font-size:12px">
              <thead>
                <tr style="background:var(--bg-secondary)">
                  <th style="padding:8px 10px;text-align:left;font-weight:500;border-bottom:1px solid var(--border-color);color:var(--text-muted);font-size:10px;text-transform:uppercase;letter-spacing:0.06em">Session</th>
                  <th style="padding:8px 10px;text-align:left;font-weight:500;border-bottom:1px solid var(--border-color);color:var(--text-muted);font-size:10px;text-transform:uppercase;letter-spacing:0.06em">Window</th>
                  <th style="padding:8px 10px;text-align:left;font-weight:500;border-bottom:1px solid var(--border-color);color:var(--text-muted);font-size:10px;text-transform:uppercase;letter-spacing:0.06em">Net P&amp;L</th>
                  <th style="padding:8px 10px;text-align:left;font-weight:500;border-bottom:1px solid var(--border-color);color:var(--text-muted);font-size:10px;text-transform:uppercase;letter-spacing:0.06em">Note</th>
                </tr>
              </thead>
              <tbody>
                ${[
                  { name: 'NY_PRIME',   window: '09:00–15:00', note: 'Profit engine — largest positions' },
                  { name: 'EVENING',    window: '17:00–22:00', note: 'Regime-sensitive — monitor BTC direction' },
                  { name: 'EU_MORNING', window: '03:00–05:00', note: 'Monitor post-04:15 losses' },
                  { name: 'ASIA_OPEN',  window: '00:00–03:00', note: 'Overnight — typically small' },
                ].map(s => `<tr style="border-bottom:1px solid var(--border-color)">
                    <td style="padding:10px;font-family:var(--font-mono);font-size:12px;color:var(--text-primary);font-weight:500">${s.name}</td>
                    <td style="padding:10px;color:var(--text-muted);font-family:var(--font-mono);font-size:11px">${s.window}</td>
                    <td style="padding:10px;color:var(--text-muted);font-family:var(--font-mono);font-size:11px">—</td>
                    <td style="padding:10px;color:var(--text-tertiary);font-size:11px">${s.note}</td>
                  </tr>`).join('')}
              </tbody>
            </table>
            </div>
          </div>

          <!-- OPEN ISSUES -->
          <div class="aether-strategies" style="padding:0">
            <div style="padding:14px 16px;border-bottom:1px solid var(--border-color)">
              <span style="font-size:11px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--text-secondary)">Open Issues · v254 Scope</span>
            </div>
            <div>
              ${issueRows || `<div style="padding:16px;color:var(--text-muted);font-size:12px">No open issues</div>`}
            </div>
          </div>
        </div>

        <!-- RIGHT COLUMN -->
        <div>

          <!-- DAILY FEED -->
          <div class="aether-strategies" style="padding:0;margin-bottom:14px">
            <div style="padding:14px 16px;border-bottom:1px solid var(--border-color)">
              <span style="font-size:11px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--text-secondary)">Daily Report Feed</span>
            </div>
            <div style="padding:10px">
              ${feedCards || `<div style="color:var(--text-muted);font-size:12px;padding:12px">No daily data available</div>`}
            </div>
          </div>

          <!-- BALANCE LEDGER -->
          <div class="aether-strategies" style="padding:0">
            <div style="padding:14px 16px;border-bottom:1px solid var(--border-color)">
              <span style="font-size:11px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--text-secondary)">Balance Ledger</span>
            </div>
            <div style="padding:0 16px">
              ${startEntry}
              ${ledgerRows}
            </div>
            <div style="padding:10px 16px;border-top:1px solid var(--border-color)">
              <div style="display:flex;justify-content:space-between;padding:4px 0">
                <span style="color:var(--text-muted);font-size:11px">Week P&amp;L</span>
                <span style="font-family:var(--font-mono);font-size:12px;font-weight:600;color:${pnlCssColor(totalNet)}">${fmtPnl(totalNet)} (${(week.pnlPercent || 0).toFixed(1)}%)</span>
              </div>
              <div style="display:flex;justify-content:space-between;padding:4px 0">
                <span style="color:var(--text-muted);font-size:11px">Starting balance</span>
                <span style="color:var(--text-muted);font-family:var(--font-mono);font-size:12px">$${(week.startingBalance || 0).toFixed(2)}</span>
              </div>
              <div style="display:flex;justify-content:space-between;padding:4px 0">
                <span style="color:var(--text-muted);font-size:11px">Next build</span>
                <span style="color:var(--cyan);font-family:var(--font-mono);font-size:12px;font-weight:500">v254</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>`;

  container.innerHTML = html;
}

</script>
<script>
// ═══ IN-APP ARTICLE READER ═══
let _readerUrl = '';

function openReader(url) {
  _readerUrl = url;
  const overlay = document.getElementById('articleReader');
  const content = document.getElementById('articleContent');
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
  if (navigator.vibrate) navigator.vibrate(8);

  content.innerHTML = '<div class="reader-loading">Loading…</div>';

  fetch(url)
    .then(r => { if (!r.ok) throw new Error(r.status); return r.text(); })
    .then(html => {
      const doc = new DOMParser().parseFromString(html, 'text/html');
      // Remove non-content elements
      doc.querySelectorAll('script,style,link,meta,nav,header,footer,.sidebar,.hamburger,.bottom-nav,noscript').forEach(el => el.remove());
      // Find main content container
      const main = doc.querySelector('main, article, .report-body, .content-body, .container, body');
      if (!main) throw new Error('no content');

      // Strip ALL inline styles + class attrs → clean semantic HTML
      main.querySelectorAll('[style]').forEach(el => el.removeAttribute('style'));
      main.querySelectorAll('[class]').forEach(el => el.removeAttribute('class'));
      main.querySelectorAll('[id]').forEach(el => el.removeAttribute('id'));
      // Make sure any links inside the article also open in reader
      main.querySelectorAll('a[href]').forEach(a => {
        const href = a.getAttribute('href');
        if (href && href.startsWith('/') && !href.startsWith('//')) {
          a.setAttribute('data-reader-link', href);
          a.removeAttribute('href'); // prevent browser navigation
          a.style.cursor = 'pointer';
        }
      });

      content.innerHTML = main.innerHTML;
    })
    .catch(() => {
      content.innerHTML = `<div class="reader-error">
        <p>Could not load article.</p>
        <button onclick="openReaderInBrowser()" style="margin-top:12px;padding:10px 20px;background:var(--accent);color:#000;border:none;border-radius:8px;font-weight:600;cursor:pointer">Open in Browser</button>
      </div>`;
    });
}

function closeReader() {
  const overlay = document.getElementById('articleReader');
  overlay.classList.remove('open');
  document.body.style.overflow = '';
  if (navigator.vibrate) navigator.vibrate(6);
}

function openReaderInBrowser() {
  if (_readerUrl) window.open(_readerUrl, '_blank', 'noopener');
}

// Intercept article link clicks — on mobile, open in reader
document.addEventListener('click', function(e) {
  // Handle data-reader-link clicks inside reader content
  const readerLink = e.target.closest('[data-reader-link]');
  if (readerLink) {
    e.preventDefault();
    openReader(readerLink.getAttribute('data-reader-link'));
    return;
  }

  // Only intercept on mobile (touch devices or narrow viewport)
  const isMobile = window.matchMedia('(max-width: 900px)').matches || navigator.maxTouchPoints > 0;
  if (!isMobile) return;

  const link = e.target.closest('a[href]');
  if (!link) return;

  const href = link.getAttribute('href');
  if (!href) return;

  // Only intercept same-origin internal links (starts with /)
  if (!href.startsWith('/') && !href.startsWith(location.origin)) return;

  // Don't intercept mailto, tel, hash links
  if (href.startsWith('//') || href.startsWith('#') || href.startsWith('mailto') || href.startsWith('tel')) return;

  // Don't intercept hq.html itself or the app root
  const path = href.startsWith('/') ? href : new URL(href, location.origin).pathname;
  if (path === '/hq.html' || path === '/' || path === '') return;

  e.preventDefault();
  openReader(path);
}, true);

// Swipe down to close reader
(function() {
  let startY = 0, isDragging = false;
  const reader = document.getElementById('articleReader');
  if (!reader) return;

  reader.addEventListener('touchstart', e => {
    if (reader.scrollTop > 0) return; // only when at top
    startY = e.touches[0].clientY;
    isDragging = true;
  }, { passive: true });

  reader.addEventListener('touchmove', e => {
    if (!isDragging) return;
    const dy = e.touches[0].clientY - startY;
    if (dy > 0) {
      reader.style.transform = `translateY(${dy}px)`;
      reader.style.transition = 'none';
    }
  }, { passive: true });

  reader.addEventListener('touchend', e => {
    if (!isDragging) return;
    isDragging = false;
    const dy = e.changedTouches[0].clientY - startY;
    reader.style.transition = '';
    if (dy > 80) {
      closeReader();
      reader.style.transform = '';
    } else {
      reader.style.transform = '';
    }
  }, { passive: true });
})();
</script>
<script>
  // Service worker registration — enables offline + "Add to Home Screen"
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js', { scope: '/' })
      .catch(() => {}); // Silent fail — doesn't break anything
  }
</script>
