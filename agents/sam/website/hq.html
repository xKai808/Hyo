<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>hq — hyo.world</title>
  <!-- PWA / native-app meta -->
  <meta name="theme-color" content="#0f1117" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="hyo hq" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icon-180.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --bg-secondary: #161822;
      --bg-tertiary: #1c1f2e;
      --bg-card: #181b28;
      --text-primary: #f0ece4;
      --text-secondary: rgba(240, 236, 228, 0.72);
      --text-tertiary: rgba(240, 236, 228, 0.50);
      --text-muted: rgba(240, 236, 228, 0.32);
      --border-color: rgba(240, 236, 228, 0.08);
      --border-hover: rgba(240, 236, 228, 0.14);
      --accent: #d4a853;
      --accent-light: #e8b877;
      --accent-bg: rgba(212, 168, 83, 0.08);
      --success: #6dd49c;
      --warning: #e8c96a;
      --error: #e07060;
      --purple: #b49af0;
      --cyan: #7ec4e0;
      --font-display: 'Plus Jakarta Sans', sans-serif;
      --font-body: 'Plus Jakarta Sans', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
      --shadow-sm: 0 2px 4px rgba(0, 0, 0, 0.16);
      --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.24);
      --radius: 12px;
      --radius-sm: 8px;
      --ease: cubic-bezier(0.16, 1, 0.3, 1);
    }

    html[data-theme="light"] {
      --bg: #faf9f6;
      --bg-secondary: #f0ede6;
      --bg-tertiary: #e8e4dc;
      --bg-card: #ffffff;
      --text-primary: #1a1a2e;
      --text-secondary: rgba(26, 26, 46, 0.72);
      --text-tertiary: rgba(26, 26, 46, 0.50);
      --text-muted: rgba(26, 26, 46, 0.32);
      --border-color: rgba(26, 26, 46, 0.10);
      --border-hover: rgba(26, 26, 46, 0.18);
      --shadow-sm: 0 2px 4px rgba(0, 0, 0, 0.06);
      --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.10);
    }

    html, body { height: 100%; overflow-x: hidden; }
    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text-primary);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      -webkit-text-size-adjust: 100%;
      overscroll-behavior: none;
    }

    /* ═══ NATIVE APP FEEL ═══ */
    /* Remove iOS tap flash on every interactive element */
    * { -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
    /* Allow natural scroll gestures back */
    .main, .sidebar { touch-action: pan-y; }
    /* No accidental text selection on UI chrome */
    .nav-item, .bottom-nav-item, .hamburger, button { user-select: none; -webkit-user-select: none; }
    /* Inputs stay selectable */
    input, textarea { user-select: text; -webkit-user-select: text; }
    /* Prevent iOS long-press context menu on UI elements */
    .nav-item, .bottom-nav, .sidebar-header { -webkit-touch-callout: none; }
    /* Safe-area: status bar on iOS standalone */
    .shell { padding-top: env(safe-area-inset-top, 0px); }
    /* Safe-area: home indicator on iPhone */
    .bottom-nav {
      padding-bottom: max(6px, env(safe-area-inset-bottom, 6px));
      height: calc(56px + env(safe-area-inset-bottom, 0px));
    }
    .bottom-nav-item { height: 56px; }
    /* Content clears bottom nav including safe area */
    @media (max-width: 768px) {
      .main { padding-bottom: calc(72px + env(safe-area-inset-bottom, 0px)) !important; }
    }
    /* Auth input: 16px prevents iOS auto-zoom on focus */
    .auth-box input { font-size: 16px !important; }
    /* ═══ IN-APP ARTICLE READER ═══ */
    .article-reader {
      position: fixed; inset: 0; z-index: 1999;
      background: var(--bg);
      transform: translateY(100%);
      transition: transform 0.32s cubic-bezier(0.16, 1, 0.3, 1);
      overflow-y: auto; overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      display: flex; flex-direction: column;
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }
    .article-reader.open { transform: translateY(0); }
    .reader-bar {
      position: sticky; top: 0; z-index: 10;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border-color);
      padding: max(12px, env(safe-area-inset-top, 12px)) 14px 10px;
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }
    .reader-back {
      display: flex; align-items: center; gap: 6px;
      min-height: 44px; padding: 0 10px 0 4px;
      border: none; background: none;
      color: var(--accent); font-family: var(--font-body);
      font-size: 15px; font-weight: 600; cursor: pointer;
    }
    .reader-open-browser {
      display: flex; align-items: center; justify-content: center;
      width: 44px; height: 44px;
      border: none; background: none;
      color: var(--text-muted); cursor: pointer;
    }
    .reader-open-browser:hover { color: var(--text-secondary); }
    .reader-content {
      padding: 24px 18px 40px;
      max-width: 680px; margin: 0 auto; width: 100%;
      font-family: var(--font-body); font-size: 15px;
      line-height: 1.75; color: var(--text-primary);
    }
    /* Reader typography — matches standalone report pages (Plus Jakarta Sans + JetBrains Mono) */
    .reader-content { font-family: var(--font-body); -webkit-font-smoothing: antialiased; }
    .reader-content h1 { font-family: var(--font-body); font-size: 28px; font-weight: 800; line-height: 1.15; letter-spacing: -0.025em; color: var(--text-primary); margin: 48px 0 18px; }
    .reader-content h2 { font-family: var(--font-body); font-size: 22px; font-weight: 700; line-height: 1.15; letter-spacing: -0.02em; color: var(--text-primary); margin: 52px 0 16px; padding-top: 24px; border-top: 1px solid var(--border-color); }
    .reader-content h3 { font-family: var(--font-body); font-size: 17px; font-weight: 700; line-height: 1.15; letter-spacing: -0.02em; color: var(--text-primary); margin: 36px 0 12px; }
    .reader-content h4 { font-family: var(--font-mono); font-size: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.12em; color: var(--accent); margin: 32px 0 12px; }
    .reader-content p { font-family: var(--font-body); font-size: 16px; line-height: 1.8; font-weight: 400; margin: 0 0 20px; color: var(--text-secondary); }
    .reader-content ul, .reader-content ol { padding-left: 24px; margin: 0 0 24px; }
    .reader-content li { font-family: var(--font-body); font-size: 16px; line-height: 1.8; font-weight: 400; margin-bottom: 10px; color: var(--text-secondary); }
    .reader-content li::marker { color: var(--accent); }
    .reader-content strong { font-family: var(--font-body); color: var(--text-primary); font-weight: 600; }
    .reader-content em { font-family: var(--font-body); font-style: italic; }
    .reader-content a { color: var(--accent); text-decoration: none; border-bottom: 1px solid rgba(212,168,83,0.3); transition: border-color 0.2s; }
    .reader-content a:hover { border-bottom-color: var(--accent); }
    .reader-content blockquote { border-left: 3px solid var(--accent); margin: 0 0 24px; padding: 8px 0 8px 20px; background: var(--accent-bg); border-radius: 0 8px 8px 0; }
    .reader-content blockquote p { font-style: italic; margin-bottom: 8px; }
    .reader-content code { font-family: var(--font-mono); background: rgba(232,226,214,0.05); padding: 2px 7px; border-radius: 4px; font-size: 14px; color: var(--accent); }
    .reader-content pre { background: var(--bg-secondary); padding: 20px 24px; border-radius: 10px; overflow-x: auto; margin: 24px 0; border: 1px solid var(--border-color); }
    .reader-content pre code { background: none; padding: 0; font-size: 13px; color: var(--text-primary); line-height: 1.65; }
    .reader-content hr { border: none; border-top: 1px solid var(--border-color); margin: 32px 0; }
    .reader-content table { width: 100%; border-collapse: collapse; font-size: 13px; margin: 24px 0; overflow-x: auto; display: block; }
    .reader-content th { font-family: var(--font-mono); background: var(--bg-secondary); padding: 12px 10px; text-align: left; font-weight: 600; border-bottom: 2px solid var(--accent); color: var(--accent); font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; white-space: nowrap; }
    .reader-content td { font-family: var(--font-body); padding: 10px; border-bottom: 1px solid var(--border-color); font-size: 13px; }
    .reader-content img { max-width: 100%; border-radius: 8px; margin: 8px 0; }
    .reader-loading { text-align: center; padding: 60px 20px; color: var(--text-muted); font-size: 14px; font-family: var(--font-mono); }
    .reader-error { text-align: center; padding: 40px 20px; color: var(--error); }

    /* View transition — smooth page switch (Chrome 111+, Safari 18.1+) */
    ::view-transition-old(root) { animation: hq-fade-out 180ms ease-out forwards; }
    ::view-transition-new(root) { animation: hq-fade-in 180ms ease-in forwards; }
    @keyframes hq-fade-out { to { opacity: 0; } }
    @keyframes hq-fade-in { from { opacity: 0; } }

    .hidden { display: none !important; }

    /* ═══ AUTH ═══ */
    .auth-gate {
      position: fixed; inset: 0; z-index: 999;
      display: flex; align-items: center; justify-content: center;
      background: var(--bg);
    }
    .auth-box { text-align: center; }
    .auth-box .logo { font-family: var(--font-display); font-size: 48px; font-weight: 700; color: var(--accent); letter-spacing: -2px; }
    .auth-box input {
      display: block; margin: 24px auto 0; width: 240px; padding: 12px 16px;
      background: var(--bg-secondary); border: 1px solid var(--border-color);
      border-radius: var(--radius-sm); color: var(--text-primary);
      font-family: var(--font-mono); font-size: 14px; text-align: center;
      outline: none; transition: border-color 0.2s;
    }
    .auth-box input:focus { border-color: var(--accent); }
    .auth-err { color: var(--error); font-size: 12px; margin-top: 8px; min-height: 18px; }

    /* ═══ SHELL ═══ */
    .shell { display: flex; height: 100vh; }

    /* ═══ SIDEBAR ═══ */
    .sidebar {
      width: 220px; min-width: 220px;
      background: var(--bg-secondary);
      border-right: 1px solid var(--border-color);
      display: flex; flex-direction: column;
      padding: 20px 0;
      overflow-y: auto;
    }
    .sidebar-header {
      padding: 0 20px 20px;
      border-bottom: 1px solid var(--border-color);
      margin-bottom: 12px;
    }
    .sidebar-header .logo {
      font-family: var(--font-display); font-size: 28px; font-weight: 700;
      color: var(--accent); letter-spacing: -1px;
    }
    .sidebar-header .version {
      font-size: 10px; color: var(--text-muted); font-family: var(--font-mono);
      margin-top: 2px;
    }

    .nav-section {
      font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px;
      color: var(--text-muted); padding: 16px 20px 6px; font-weight: 600;
    }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 20px; cursor: pointer;
      font-size: 13px; font-weight: 500; color: var(--text-secondary);
      transition: all 0.15s var(--ease);
      border-left: 3px solid transparent;
    }
    .nav-item:hover { background: var(--bg-tertiary); color: var(--text-primary); }
    .nav-item.active {
      background: var(--accent-bg);
      color: var(--accent);
      border-left-color: var(--accent);
    }
    .nav-icon { font-size: 15px; width: 20px; text-align: center; flex-shrink: 0; }
    .nav-dot {
      width: 6px; height: 6px; border-radius: 50%; margin-left: auto;
    }
    .nav-dot.ok { background: var(--success); }
    .nav-dot.err { background: var(--error); }
    /* New-report badge (SE-011-004: visibility when an agent ships new work) */
    .nav-badge {
      margin-left: auto;
      display: none;
      padding: 1px 6px;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      border-radius: 8px;
      background: var(--accent);
      color: #fff;
      line-height: 1.5;
    }
    .nav-badge.visible { display: inline-block; }
    /* When badge visible, push nav-dot to be adjacent (not margin-left:auto) */
    .nav-item .nav-badge.visible + .nav-dot { margin-left: 6px; }

    .sidebar-footer {
      margin-top: auto;
      padding: 16px 20px 0;
      border-top: 1px solid var(--border-color);
      display: flex; flex-direction: column; gap: 10px;
    }
    .clock {
      font-family: var(--font-mono); font-size: 12px; color: var(--text-tertiary);
      text-align: center;
    }
    .theme-toggle {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      background: var(--bg-tertiary); border: 1px solid var(--border-color);
      border-radius: var(--radius-sm); padding: 6px 12px;
      color: var(--text-secondary); cursor: pointer; font-size: 13px;
      transition: all 0.15s;
    }
    .theme-toggle:hover { background: var(--bg); border-color: var(--border-hover); }

    /* ═══ HAMBURGER (mobile only) ═══ */
    .hamburger {
      display: none;
      position: fixed; top: 14px; left: 14px; z-index: 1001;
      width: 40px; height: 40px;
      background: var(--bg-secondary); border: 1px solid var(--border-color);
      border-radius: var(--radius-sm); cursor: pointer;
      align-items: center; justify-content: center;
      color: var(--text-primary); font-size: 20px;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s;
    }
    .hamburger:hover { background: var(--bg-tertiary); }
    .sidebar-overlay {
      display: none; position: fixed; inset: 0; z-index: 999;
      background: rgba(0,0,0,0.5); -webkit-tap-highlight-color: transparent;
    }

    /* ═══ MOBILE ═══ */
    @media (max-width: 768px) {
      .hamburger { display: flex; }

      .sidebar {
        position: fixed; top: 0; left: 0; bottom: 0; z-index: 1000;
        transform: translateX(-100%);
        transition: transform 0.28s var(--ease);
        width: 260px; min-width: 260px;
        box-shadow: var(--shadow-md);
      }
      .sidebar.open { transform: translateX(0); }
      .sidebar.open ~ .sidebar-overlay { display: block; }

      .main {
        padding: 14px 12px;
        padding-top: 64px; /* room for hamburger */
        overflow-x: clip;
      }

      .report { padding: 18px 16px; }
      .report-header { flex-wrap: wrap; gap: 10px; }
      .main-header h1 { font-size: 20px; }
    }

    /* ═══ MAIN CONTENT ═══ */
    .main {
      flex: 1; overflow-y: auto; overflow-x: clip; padding: 32px 40px;
      max-width: 900px; min-width: 0;
    }
    @media (min-width: 1400px) { .main { max-width: 960px; } }

    .main-header {
      margin-bottom: 28px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border-color);
    }
    .main-header h1 {
      font-family: var(--font-display); font-size: 24px; font-weight: 700;
      letter-spacing: -0.5px;
    }
    .main-header .sub {
      font-size: 13px; color: var(--text-tertiary); margin-top: 4px;
    }

    /* ═══ FEED / REPORT CARDS ═══ */
    .report {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius);
      padding: 28px 32px;
      margin-bottom: 20px;
      transition: border-color 0.2s;
    }
    .report:hover { border-color: var(--border-hover); }

    .report-header {
      display: flex; align-items: flex-start; gap: 14px;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border-color);
    }
    .report-avatar {
      width: 40px; height: 40px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
      background: var(--bg-tertiary);
    }
    .report-meta { flex: 1; }
    .report-title {
      font-family: var(--font-display); font-size: 18px; font-weight: 700;
      letter-spacing: -0.3px;
    }
    .report-byline {
      font-size: 12px; color: var(--text-tertiary); margin-top: 2px;
      font-family: var(--font-mono);
    }
    .report-type {
      font-size: 10px; text-transform: uppercase; letter-spacing: 1px;
      padding: 3px 8px; border-radius: 4px; font-weight: 600;
      background: var(--bg-tertiary); color: var(--text-secondary);
      white-space: nowrap;
    }

    .report-section { margin-bottom: 18px; }
    .report-section:last-child { margin-bottom: 0; }
    .report-section-title {
      font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
      color: var(--text-muted); font-weight: 600; margin-bottom: 8px;
    }
    .report-section p, .report-section li {
      font-size: 14px; color: var(--text-secondary); line-height: 1.7;
    }
    .report-section ul {
      list-style: none; padding: 0;
    }
    .report-section li {
      padding: 4px 0 4px 18px; position: relative;
    }
    .report-section li::before {
      content: ''; position: absolute; left: 0; top: 12px;
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--text-muted);
    }
    .report-section li.good::before { background: var(--success); }
    .report-section li.warn::before { background: var(--warning); }
    .report-section li.bad::before { background: var(--error); }

    .report-section .agent-highlight {
      padding: 12px 16px;
      background: var(--bg-tertiary);
      border-radius: var(--radius-sm);
      margin-bottom: 8px;
      border-left: 3px solid var(--text-muted);
    }
    .report-section .agent-highlight .ah-name {
      font-weight: 600; font-size: 13px; margin-bottom: 4px;
    }
    .report-section .agent-highlight .ah-text {
      font-size: 13px; color: var(--text-secondary); line-height: 1.6;
    }

    /* ═══ AGENT DETAIL VIEW ═══ */
    .agent-profile {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius);
      padding: 28px 32px;
      margin-bottom: 24px;
    }
    .agent-profile-header {
      display: flex; align-items: center; gap: 14px;
      margin-bottom: 20px;
    }
    .agent-profile-header .ap-icon {
      font-size: 32px; width: 52px; height: 52px;
      display: flex; align-items: center; justify-content: center;
      background: var(--bg-tertiary); border-radius: 50%;
    }
    .agent-profile-header .ap-info h2 {
      font-family: var(--font-display); font-size: 22px; font-weight: 700;
    }
    .agent-profile-header .ap-info .ap-role {
      font-size: 13px; color: var(--text-tertiary);
    }
    .agent-profile .ap-responsibilities {
      font-size: 14px; color: var(--text-secondary); line-height: 1.7;
      margin-bottom: 24px;
      padding: 16px;
      background: var(--bg-tertiary);
      border-radius: var(--radius-sm);
      font-style: italic;
    }

    .goals-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px;
      margin-bottom: 24px;
    }
    @media (max-width: 900px) { .goals-grid { grid-template-columns: 1fr; } }
    .goal-col {
      background: var(--bg-tertiary);
      border-radius: var(--radius-sm);
      padding: 16px;
    }
    .goal-col h4 {
      font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
      margin-bottom: 10px; font-weight: 600;
    }
    .goal-col.short h4 { color: var(--success); }
    .goal-col.medium h4 { color: var(--warning); }
    .goal-col.long h4 { color: var(--purple); }
    .goal-col li {
      font-size: 13px; color: var(--text-secondary); line-height: 1.6;
      padding: 4px 0; list-style: none;
    }
    .goal-col li::before { content: '→ '; color: var(--text-muted); }

    .status-lists {
      display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
      margin-bottom: 24px;
    }
    @media (max-width: 900px) { .status-lists { grid-template-columns: 1fr; } }
    .status-list {
      background: var(--bg-tertiary);
      border-radius: var(--radius-sm);
      padding: 16px;
    }
    .status-list h4 {
      font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
      margin-bottom: 10px; font-weight: 600; color: var(--text-muted);
    }
    .status-list.in-process h4 { color: var(--accent); }
    .status-list.pending h4 { color: var(--text-tertiary); }
    .status-list li {
      font-size: 13px; color: var(--text-secondary); line-height: 1.6;
      padding: 3px 0; list-style: none;
    }
    .status-list.in-process li::before { content: '◉ '; color: var(--accent); }
    .status-list.pending li::before { content: '○ '; color: var(--text-muted); }

    /* ═══ HISTORY SECTION ═══ */
    .history-section {
      margin-top: 32px;
    }
    .history-section h3 {
      font-family: var(--font-display); font-size: 18px; font-weight: 700;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border-color);
    }

    .month-tabs {
      display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap;
    }
    .month-tab {
      padding: 6px 14px; font-size: 12px; font-weight: 600;
      background: var(--bg-tertiary); border: 1px solid var(--border-color);
      border-radius: var(--radius-sm); cursor: pointer;
      color: var(--text-secondary); transition: all 0.15s;
    }
    .month-tab:hover { border-color: var(--border-hover); color: var(--text-primary); }
    .month-tab.active { background: var(--accent-bg); border-color: var(--accent); color: var(--accent); }

    .history-feed { /* reports render here */ }

    /* ═══ EMPTY STATE ═══ */
    .empty-state {
      text-align: center; padding: 60px 20px;
      color: var(--text-muted); font-size: 14px;
    }

    /* ═══ TOAST ═══ */
    .toast {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: var(--bg-tertiary); border: 1px solid var(--border-color);
      border-radius: var(--radius-sm); padding: 10px 20px;
      font-size: 13px; color: var(--text-secondary);
      opacity: 0; transition: opacity 0.3s;
      pointer-events: none; z-index: 100;
    }
    .toast.show { opacity: 1; }

    /* ═══ SCROLLBAR ═══ */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--border-hover); }

    /* ═══ AETHER DASHBOARD ═══ */
    .aether-dashboard {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .aether-summary {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 12px;
    }

    .aether-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-sm);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .aether-card.metric {
      border-left: 3px solid var(--warning);
    }

    .aether-card .label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
    }

    .aether-card .value {
      font-size: 24px;
      font-weight: 700;
      color: var(--text-primary);
      font-family: var(--font-mono);
    }

    .aether-card .subtext {
      font-size: 12px;
      color: var(--text-tertiary);
    }

    .aether-card .status-badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      width: fit-content;
    }

    .aether-card .status-active {
      background: rgba(109, 212, 156, 0.15);
      color: var(--success);
    }

    .aether-card .status-standby {
      background: rgba(232, 201, 106, 0.15);
      color: var(--warning);
    }

    .aether-card .status-caution {
      background: rgba(224, 112, 96, 0.15);
      color: var(--error);
    }

    .aether-card .status-monitoring {
      background: rgba(126, 196, 224, 0.15);
      color: var(--cyan);
    }

    .aether-strategies {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-sm);
      padding: 20px;
    }

    .aether-strategies h4 {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-secondary);
      margin-bottom: 16px;
    }

    .aether-strategies table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    .aether-strategies th {
      text-align: left;
      padding: 10px 0;
      padding-right: 16px;
      border-bottom: 1px solid var(--border-color);
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      font-size: 11px;
      letter-spacing: 0.5px;
    }

    .aether-strategies td {
      padding: 12px 0;
      padding-right: 16px;
      border-bottom: 1px solid var(--border-color);
      color: var(--text-secondary);
    }

    .aether-strategies td:last-child {
      padding-right: 0;
    }

    .aether-strategies tr:last-child td {
      border-bottom: none;
    }

    .aether-strategies .strategy-name {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text-primary);
      font-weight: 500;
    }

    .aether-strategies .metric-num {
      font-family: var(--font-mono);
      text-align: right;
    }

    .aether-pnl-positive {
      color: var(--success);
    }

    .aether-pnl-negative {
      color: var(--error);
    }

    .aether-section {
      margin-top: 24px;
    }

    /* ═══ AETHER v2 dashboard ═══ */
    .aether-v2 {
      font-family: var(--font-body);
      color: var(--text-primary);
    }

    /* Responsive grid classes used by renderAetherDashboard */
    .aether-metric-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
      margin-bottom: 20px;
    }
    .aether-main-grid {
      display: grid;
      grid-template-columns: 1fr 300px;
      gap: 14px;
    }
    .aether-main-grid > * { min-width: 0; }
    .aether-metric-grid > * { min-width: 0; }
    .aether-table-scroll {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    /* Tablet: metric row collapses to 3 */
    @media (max-width: 1024px) {
      .aether-metric-grid { grid-template-columns: repeat(3, 1fr); }
      .aether-main-grid { grid-template-columns: 1fr 260px; }
    }

    /* Mobile: single column everything */
    @media (max-width: 768px) {
      .aether-metric-grid { grid-template-columns: repeat(2, 1fr); }
      .aether-main-grid { grid-template-columns: 1fr; }
      .aether-hide-mobile { display: none !important; }
    }

    @media (max-width: 1400px) {
      .aether-summary {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 768px) {
      .aether-summary {
        grid-template-columns: 1fr;
      }
    }

    /* ═══ BOTTOM NAV (mobile only) ═══ */
    .bottom-nav {
      display: none;
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 998;
      background: var(--bg-secondary);
      border-top: 1px solid var(--border-color);
      padding: 6px 0;
      padding-bottom: calc(6px + env(safe-area-inset-bottom, 0px));
    }
    .bottom-nav-item {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      gap: 2px; padding: 4px 2px;
      cursor: pointer;
      color: var(--text-muted);
      transition: color 0.15s;
      -webkit-tap-highlight-color: transparent;
      border: none; background: none;
    }
    .bottom-nav-item.active { color: var(--accent); }
    .bottom-nav-item .bn-icon { font-size: 19px; }
    .bottom-nav-item .bn-label {
      font-size: 9px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.4px; font-family: var(--font-mono);
    }

    @media (max-width: 768px) {
      .bottom-nav { display: flex; }
      .main { padding-bottom: 80px !important; overflow-x: clip; }
    }
  </style>
</head>

  <div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════════════════
// HQ v9 — Feed-centric dashboard
// ═══════════════════════════════════════════════════════════════════

let FEED_DATA = null;
let AETHER_DATA = null;
let AETHER_SECTIONS = null;
let RESEARCH_ARCHIVE = null;
let currentView = 'feed';
let currentMonth = null; // for agent history
// Use localStorage so the token persists across browser sessions (not cleared on tab close).
// Token has a 30-day expiry checked on load.
let HQ_TOKEN = (() => {
  try {
    const stored = localStorage.getItem('hq_token');
    if (!stored) return null;
    const { token, expires } = JSON.parse(stored);
    if (expires && Date.now() > expires) { localStorage.removeItem('hq_token'); return null; }
    return token;
  } catch(e) { return null; }
})();

// ═══ THEME ═══
function initTheme() {
  const saved = localStorage.getItem('hq-theme') || 'dark';
  document.documentElement.setAttribute('data-theme', saved);
  updateThemeIcon();
}
function updateThemeIcon() {
  const theme = document.documentElement.getAttribute('data-theme');
  document.getElementById('themeIcon').textContent = theme === 'light' ? '🌙' : '☀️';
}
document.getElementById('themeToggle').addEventListener('click', () => {
  const current = document.documentElement.getAttribute('data-theme') || 'dark';
  const next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('hq-theme', next);
  updateThemeIcon();
});
initTheme();

// ═══ MOBILE SIDEBAR ═══
const menuBtn = document.getElementById('menuBtn');
const sidebar = document.getElementById('sidebar');
const sidebarOverlay = document.getElementById('sidebarOverlay');

function openSidebar() { sidebar.classList.add('open'); sidebarOverlay.style.display = 'block'; }
function closeSidebar() { sidebar.classList.remove('open'); sidebarOverlay.style.display = 'none'; }

menuBtn.addEventListener('click', () => sidebar.classList.contains('open') ? closeSidebar() : openSidebar());
sidebarOverlay.addEventListener('click', closeSidebar);

// Close sidebar on nav-item click (mobile)
document.querySelectorAll('.nav-item').forEach(el => {
  el.addEventListener('click', () => { if (window.innerWidth <= 768) closeSidebar(); });
});

// ═══ AUTH ═══
const authGate = document.getElementById('authGate');
const authInput = document.getElementById('authInput');
authInput.addEventListener('keydown', async e => {
  if (e.key !== 'Enter') return;
  const pw = authInput.value;
  if (!pw) return;
  try {
    const r = await fetch('/api/hq?action=auth', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ password: pw }),
    });
    const j = await r.json();
    if (j.ok && j.token) {
      HQ_TOKEN = j.token;
      // Persist in localStorage with 30-day expiry so login survives tab/browser close
      localStorage.setItem('hq_token', JSON.stringify({ token: HQ_TOKEN, expires: Date.now() + 30*24*60*60*1000 }));
      authGate.classList.add('hidden');
      document.getElementById('shell').style.display = 'flex';
      boot();
    } else {
      document.getElementById('authErr').textContent = j.error || 'wrong password';
      authInput.value = '';
    }
  } catch {
    document.getElementById('authErr').textContent = 'could not reach server';
  }
});
if (HQ_TOKEN) {
  authGate.classList.add('hidden');
  document.getElementById('shell').style.display = 'flex';
  boot();
}

// ═══ CLOCK ═══
function updateClock() {
  document.getElementById('clock').textContent = new Date().toLocaleTimeString('en-US', {
    timeZone: 'America/Denver', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
  }) + ' MT';
}
setInterval(updateClock, 1000);
updateClock();

// ═══ TOAST ═══
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

// ═══ NAV ═══
document.querySelectorAll('.nav-item').forEach(item => {
  item.addEventListener('click', () => {
    const view = item.dataset.view;
    if (!view) return;
    if (view === 'research') {
      // research loads in main content, not new window
      goView('research');
      return;
    }
    goView(view);
  });
});

function goView(name) {
  currentView = name;
  currentMonth = null;
  document.querySelectorAll('.nav-item').forEach(n =>
    n.classList.toggle('active', n.dataset.view === name)
  );
  // Sync bottom nav active state
  document.querySelectorAll('.bottom-nav-item[data-bnview]').forEach(n =>
    n.classList.toggle('active', n.dataset.bnview === name)
  );
  // SE-011-004: clear the "new report" badge for this agent when visited
  markAgentSeen(name);
  // Scroll main content to top on view change
  const main = document.getElementById('mainContent');
  if (main) main.scrollTop = 0;
  // Light haptic on nav tap (Android; iOS silent-fails gracefully)
  if (navigator.vibrate) navigator.vibrate(8);
  // Native-feel view transition (Chrome 111+ / Safari 18.1+; falls back silently)
  if (document.startViewTransition) {
    document.startViewTransition(() => render());
  } else {
    render();
  }
}

// ═══ NEW-REPORT BADGE (SE-011-004) ═══
// Track the most recent report timestamp seen per agent in localStorage.
// On each feed refresh, compare the latest report timestamp per agent
// against the last-seen value. If newer → show a "NEW" badge on the sidebar.
const BADGE_AGENTS = ['kai', 'nel', 'sam', 'ra', 'aether', 'dex'];

function getLastSeen(agent) {
  try { return localStorage.getItem('hq:lastSeen:' + agent) || ''; }
  catch (e) { return ''; }
}
function setLastSeen(agent, ts) {
  try { localStorage.setItem('hq:lastSeen:' + agent, ts || ''); }
  catch (e) {}
}
function latestReportTsFor(agent) {
  if (!FEED_DATA || !FEED_DATA.reports) return '';
  let latest = '';
  for (const r of FEED_DATA.reports) {
    if ((r.author || '').toLowerCase() !== agent) continue;
    const ts = r.timestamp || r.date || '';
    if (ts > latest) latest = ts;
  }
  return latest;
}
function markAgentSeen(agent) {
  if (!BADGE_AGENTS.includes(agent)) return;
  const ts = latestReportTsFor(agent);
  if (ts) setLastSeen(agent, ts);
  updateBadges();
}
function updateBadges() {
  for (const a of BADGE_AGENTS) {
    const el = document.getElementById('badge-' + a);
    if (!el) continue;
    const latest = latestReportTsFor(a);
    const seen = getLastSeen(a);
    const hasNew = latest && latest > seen && currentView !== a;
    el.classList.toggle('visible', !!hasNew);
  }
}

// ═══ DATA ═══
async function fetchFeed() {
  try {
    const r = await fetch('/data/feed.json?t=' + Date.now());
    if (r.ok) return await r.json();
  } catch (e) { console.warn('feed fetch failed:', e); }
  return null;
}

async function fetchHyoMessages() {
  if (!HQ_TOKEN) return [];
  try {
    const r = await fetch('/api/hq?action=data', {
      headers: { 'authorization': `Bearer ${HQ_TOKEN}` }
    });
    if (r.ok) {
      const j = await r.json();
      return j.hyoMessages || [];
    }
  } catch (e) { /* no-op */ }
  return [];
}

async function boot() {
  FEED_DATA = await fetchFeed();
  if (!FEED_DATA) FEED_DATA = { reports: [], agents: {}, today: new Date().toISOString().slice(0,10) };
  FEED_DATA._hyoMessages = await fetchHyoMessages();
  try {
    const resp = await fetch('/data/aether-metrics.json');
    if (resp.ok) {
      AETHER_DATA = await resp.json();
    }
  } catch (e) {
    console.log('Could not load Aether metrics');
  }
  try {
    const resp2 = await fetch('/data/aether-daily-sections.json');
    if (resp2.ok) {
      AETHER_SECTIONS = await resp2.json();
    }
  } catch (e) {
    console.log('Could not load Aether daily sections');
  }
  try {
    const resp3 = await fetch('/data/research-archive.json');
    if (resp3.ok) RESEARCH_ARCHIVE = await resp3.json();
  } catch (e) { console.log('Could not load research archive'); }
  render();
  // Refresh every 60s
  setInterval(async () => {
    const prev = FEED_DATA?._hyoMessages || [];
    FEED_DATA = await fetchFeed();
    if (!FEED_DATA) FEED_DATA = { reports: [], agents: {}, today: new Date().toISOString().slice(0,10) };
    // Merge: keep locally-added messages + fetch from store
    const fresh = await fetchHyoMessages();
    // De-dupe by ts+message
    const seen = new Set(fresh.map(m => m.ts + m.message));
    FEED_DATA._hyoMessages = [...fresh, ...prev.filter(m => !seen.has(m.ts + m.message))];
    try {
      const resp = await fetch('/data/aether-metrics.json');
      if (resp.ok) {
        AETHER_DATA = await resp.json();
      }
    } catch (e) {
      console.log('Could not load Aether metrics');
    }
    try {
      const resp2 = await fetch('/data/aether-daily-sections.json');
      if (resp2.ok) {
        AETHER_SECTIONS = await resp2.json();
      }
    } catch (e) {
      console.log('Could not load Aether daily sections');
    }
    render();
  }, 60000);
}

// ═══ RENDER ENGINE ═══
function render() {
  const main = document.getElementById('mainContent');
  if (!FEED_DATA) {
    main.innerHTML = '<div class="empty-state">Loading feed...</div>';
    return;
  }
  // Update sidebar badges on every render (feed may have new reports)
  try { updateBadges(); } catch (e) { /* no-op */ }
  // If we're currently viewing this agent, mark their latest report as seen
  if (BADGE_AGENTS.includes(currentView)) {
    const latest = latestReportTsFor(currentView);
    if (latest) setLastSeen(currentView, latest);
  }
  if (currentView === 'feed') {
    renderFeed(main);
  } else if (currentView === 'research') {
    renderResearch(main);
  } else if (currentView === 'ant') {
    renderAnt(main);
  } else {
    renderAgentView(main, currentView);
  }
}

// ═══ FEED VIEW ═══
function renderFeed(container) {
  const today = FEED_DATA.today || new Date().toISOString().slice(0, 10);
  // Show today's reports, most recent first
  // Feed scope: morning-report, newsletter, aether-analysis (daily essentials) +
  // agent-weekly (Saturdays only). agent-daily removed — agent operational
  // reports are internal; only morning-report, newsletter, aether-analysis, podcast visible.
  // agent-reflection and research-drop live in Research tab only.
  // agent-goals removed — goal data lives in agent ACTIVE.md, not the public feed.
  const FEED_ALLOWED_TYPES = new Set(['morning-report', 'newsletter', 'aether-analysis', 'agent-weekly', 'podcast']);
  const todayReports = (FEED_DATA.reports || [])
    .filter(r => r.date === today && FEED_ALLOWED_TYPES.has(r.type))
    .sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

  let html = `
    <div class="main-header">
      <h1>Feed</h1>
      <div class="sub">${formatDateFull(today)} — ${todayReports.length} report${todayReports.length !== 1 ? 's' : ''} today</div>

    html += '<div class="empty-state">No reports yet today. Morning report arrives at 05:00 MT.</div>';

    for (const report of todayReports) {
      html += renderReport(report);
    }
  }

  container.innerHTML = html;
}

// ═══ AGENT VIEW ═══
function renderAgentView(container, agentId) {
  const agent = FEED_DATA.agents?.[agentId];
  if (!agent) {
    container.innerHTML = '<div class="empty-state">Agent not found</div>';
    return;
  }

  // Special dashboard for Aether
  if (agentId.toLowerCase() === 'aether') {
    renderAetherDashboard(container, agent);
    return;
  }

  // Special inbox for Kai
  if (agentId === 'kai') {
    renderKaiView(container, agent);
    return;
  }

  // Get all reports by this agent, organized by month
  const agentReports = (FEED_DATA.reports || [])
    .filter(r => r.author.toLowerCase() === agent.name.toLowerCase())
    .sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

  const months = {};
  for (const r of agentReports) {
    const m = r.date.slice(0, 7); // YYYY-MM
    if (!months[m]) months[m] = [];
    months[m].push(r);
  }
  const monthKeys = Object.keys(months).sort().reverse();
  if (!currentMonth && monthKeys.length > 0) currentMonth = monthKeys[0];

  let html = '';

  // ── Agent Profile ──
  html += `
    <div class="agent-profile">
      <div class="agent-profile-header">
        <div class="ap-icon">${agent.icon}</div>
        <div class="ap-info">
          <h2>${agent.name}</h2>
          <div class="ap-role">${agent.role}</div>
        </div>
      </div>
      <div class="ap-responsibilities">"${agent.responsibilities}"</div>

      ${(() => {
        const sc = agent.scores;
        if (!sc) return '';
        const barColor = (s, min) => s >= min ? 'var(--accent)' : s >= min * 0.67 ? '#e8c96a' : '#f55066';
        const scoreCard = (label, s, min) => {
          const col = barColor(s, min);
          const warn = s < min ? '<div style="font-size:0.7em;color:#f55066;margin-top:4px;">&#9888; Below minimum (' + min + ')</div>' : '';
          return '<div style="flex:1;min-width:120px;background:var(--bg-secondary);border-radius:8px;padding:10px 14px;border:1px solid rgba(255,255,255,0.06);">'
            + '<div style="font-size:0.72em;font-weight:600;color:var(--text-muted);letter-spacing:0.05em;text-transform:uppercase;margin-bottom:4px;">' + label + '</div>'
            + '<div style="display:flex;align-items:baseline;gap:6px;">'
            + '<span style="font-size:1.6em;font-weight:700;color:' + col + ';">' + s + '</span>'
            + '<span style="font-size:0.8em;color:var(--text-muted);">/100</span>'
            + '</div>'
            + '<div style="margin-top:6px;height:4px;background:rgba(255,255,255,0.08);border-radius:2px;">'
            + '<div style="width:' + s + '%;height:100%;background:' + col + ';border-radius:2px;"></div>'
            + '</div>' + warn + '</div>';
        };
        let sc_html = '<div style="display:flex;gap:10px;margin:12px 0;flex-wrap:wrap;">';
        if (sc.sicq) sc_html += scoreCard('SICQ Quality', sc.sicq.score, sc.sicq.min || 60);
        if (sc.omp)  sc_html += scoreCard('OMP Outcomes', sc.omp.score,  sc.omp.min  || 70);
        sc_html += '</div>';
        return sc_html;
      })()}

      <div class="goals-grid">
        <div class="goal-col short">
          <h4>Short-term</h4>
          <ul>${(agent.goals?.short || []).map(g => `<li>${g}</li>`).join('')}</ul>
        </div>
        <div class="goal-col medium">
          <h4>Medium-term</h4>
          <ul>${(agent.goals?.medium || []).map(g => `<li>${g}</li>`).join('')}</ul>
        </div>
        <div class="goal-col long">
          <h4>Long-term</h4>
          <ul>${(agent.goals?.long || []).map(g => `<li>${g}</li>`).join('')}</ul>
        </div>
      </div>

      <div class="status-lists">
        <div class="status-list in-process">
          <h4>In Process</h4>
          <ul>${(agent.inProcess || []).map(t => `<li>${t}</li>`).join('')}</ul>
          ${(agent.inProcess || []).length === 0 ? '<div style="font-size:13px;color:var(--text-muted);">Nothing active</div>' : ''}
        </div>
        <div class="status-list pending">
          <h4>Pending</h4>
          <ul>${(agent.pending || []).map(t => `<li>${t}</li>`).join('')}</ul>
          ${(agent.pending || []).length === 0 ? '<div style="font-size:13px;color:var(--text-muted);">Nothing pending</div>' : ''}
        </div>
      </div>
    </div>
  `;

  // ── History ──
  html += `<div class="history-section">
    <h3>Report History</h3>`;

  if (monthKeys.length === 0) {
    html += '<div class="empty-state">No reports from this agent yet.</div>';
  } else {
    // Month tabs
    html += '<div class="month-tabs">';
    for (const mk of monthKeys) {
      const label = formatMonthLabel(mk);
      const active = mk === currentMonth ? ' active' : '';
      html += `<div class="month-tab${active}" onclick="selectMonth('${mk}')">${label}</div>`;
    }
    html += '</div>';

    // Reports for selected month
    const monthReports = months[currentMonth] || [];
    html += '<div class="history-feed">';
    if (monthReports.length === 0) {
      html += '<div class="empty-state">No reports this month.</div>';
    } else {
      // Group by week
      const weeks = {};
      for (const r of monthReports) {
        const weekNum = getWeekLabel(r.date);
        if (!weeks[weekNum]) weeks[weekNum] = [];

        for (const r of reports) {
          html += renderReport(r);
        }
      }
    }
    html += '</div>';
  }

  html += '</div>';
  container.innerHTML = html;
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function sendHyoMessage() {
  const input = document.getElementById('hyoMsgInput');
  const btn = document.getElementById('hyoMsgSendBtn');
  const status = document.getElementById('hyoMsgStatus');
  const msg = input?.value?.trim();
  if (!msg) return;

  btn.disabled = true;
  btn.style.opacity = '0.5';
  status.textContent = 'Sending…';
  status.style.color = 'var(--text-muted)';

  try {
    const r = await fetch('/api/hq?action=hyo-message', {
      method: 'POST',
      headers: {
        'content-type': 'application/json',
        'authorization': `Bearer ${HQ_TOKEN}`,
      },
      body: JSON.stringify({ message: msg }),
    });
    const j = await r.json();
    if (j.ok) {
      status.textContent = '✓ Message queued for Kai';
      status.style.color = 'var(--good)';
      input.value = '';
      input.style.borderColor = 'var(--border)';
      // Re-render to show the new message
      if (!FEED_DATA._hyoMessages) FEED_DATA._hyoMessages = [];
      FEED_DATA._hyoMessages.unshift({ ts: j.ts, from: 'hyo', message: msg, status: 'unread' });
      render();
    } else {
      status.textContent = `✗ ${j.error || 'send failed'}`;
      status.style.color = 'var(--warn)';
    }
  } catch (e) {
    status.textContent = '✗ Network error — try again';
    status.style.color = 'var(--warn)';
  } finally {
    btn.disabled = false;
    btn.style.opacity = '1';
  }
}

// ═══ REPORT RENDERER ═══
function renderReport(report) {
  const time = formatTime(report.timestamp);
  const typeLabel = getTypeLabel(report.type);
  const borderColor = report.authorColor || 'var(--accent)';

  let body = '';
  const s = report.sections || {};

  if (report.type === 'morning-report') {
    body = renderMorningReport(s);
  } else if (report.type === 'ceo-report') {
    body = renderCeoReport(s);
  } else if (report.type === 'agent-reflection' || report.type === 'self-improve-report') {
    body = renderAgentReflection(s);
  } else if (report.type === 'newsletter') {
    body = renderNewsletter(s, report);
  } else if (report.type === 'aether-analysis') {
    body = renderAetherAnalysis(s, report);
  } else if (report.type === 'podcast') {
    body = renderPodcast(s, report);
  } else if (report.type === 'research-drop') {
    body = renderResearchDrop(s, report);
  } else if (report.type === 'agent-goals') {
    body = renderAgentGoals(s, report);
  } else if (report.type === 'agent-daily') {
    body = renderAgentDaily(s, report);
  } else if (report.type === 'agent-weekly') {
    body = renderAgentWeekly(s, report);
  } else {
    // Generic
    for (const [key, val] of Object.entries(s)) {
      body += renderGenericSection(key, val);
    }
  }

  return `
    <div class="report" style="border-left: 3px solid ${borderColor};">
      <div class="report-header">
        <div class="report-avatar">${report.authorIcon || '📋'}</div>
        <div class="report-meta">
          <div class="report-title">${report.title}</div>
          <div class="report-byline">${report.author} · ${time}</div>
        </div>
        <div class="report-type">${typeLabel}</div>
      </div>
      ${body}
    </div>
  `;
}

function renderScoreBar(score, maxScore) {
  const pct = Math.min(100, Math.round((score / maxScore) * 100));
  const color = score >= 70 ? 'var(--accent)' : score >= 50 ? '#e8c96a' : '#f55066';
  return `<div style="height:6px;background:rgba(255,255,255,0.08);border-radius:3px;width:100%;overflow:hidden;margin-top:4px;">
    <div style="height:100%;width:${pct}%;background:${color};border-radius:3px;transition:width 0.5s;"></div>
  </div>`;
}

function renderMorningReport(s) {
  let html = '';
  if (s.summary) {
    html += sec('Executive Summary', `<p>${s.summary}</p>`);
  }
  if (s.wentWell?.length) {
    html += sec('What Went Well', `<ul>${s.wentWell.map(w => `<li class="good">${w}</li>`).join('')}</ul>`);
  }
  if (s.needsAttention?.length) {

      const agentData = FEED_DATA?.agents?.[agent];
      const icon = agentData?.icon || '🤖';
      const name = agentData?.name || agent.charAt(0).toUpperCase() + agent.slice(1);
      const sicq = s.sicqScores?.[agent];
      const omp = s.ompScores?.[agent];
      scoreHtml += `<div style="background:var(--bg-tertiary,var(--bg-secondary));border-radius:8px;padding:10px 12px;border:1px solid rgba(255,255,255,0.06);">
        <div style="font-size:0.78em;font-weight:600;color:var(--text-muted);margin-bottom:6px;">${icon} ${name}</div>`;
      if (sicq) {
        const sicqColor = sicq.score >= 70 ? 'var(--accent)' : sicq.score >= 50 ? '#e8c96a' : '#f55066';
        scoreHtml += `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:2px;">

        const ompColor = omp.score >= 70 ? 'var(--accent)' : omp.score >= 50 ? '#e8c96a' : '#f55066';
        scoreHtml += `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:2px;margin-top:6px;">
          <span style="font-size:0.72em;color:var(--text-muted);">OMP</span>
          <span style="font-size:0.82em;font-weight:700;color:${ompColor};">${omp.score}</span>
        </div>${renderScoreBar(omp.score, 100)}`;
      }
      scoreHtml += `</div>`;
    }
    scoreHtml += `</div><div style="font-size:0.72em;color:var(--text-muted);margin-top:6px;">SICQ = system quality (0–100) · OMP = outcome profile (0–100) · updated daily by flywheel</div>`;
    html += sec('Agent Scores', scoreHtml);
  }
  if (s.agentHighlights) {
    let ah = '';
    for (const [agent, text] of Object.entries(s.agentHighlights)) {

        <div class="ah-text">${text}</div>
      </div>`;
    }
    html += sec('Agent Highlights', ah);
  }
  return html;
}

function renderNewsletter(s, report) {
  let html = '';

  if (stories.length > 0) {
    html += `<div style="display:flex;flex-direction:column;gap:12px;margin-bottom:14px;">`;

      const catColors = {
        tech: '#4a9eff', ai: '#9b59b6', macro: '#e67e22',
        crypto: '#f39c12', politics: '#e74c3c', science: '#2ecc71',
      };
      const catColor = catColors[cat] || 'var(--text-muted)';
      html += `<div style="background:var(--bg-secondary);border-radius:8px;padding:12px 14px;border-left:3px solid ${catColor};">`;
      if (title) {
        html += `<div style="display:flex;align-items:baseline;gap:8px;margin-bottom:6px;">`;
        html += `<span style="font-size:0.78em;color:${catColor};font-weight:600;text-transform:uppercase;letter-spacing:0.04em;">${cat || 'story'}</span>`;
        html += `<strong style="color:var(--text-primary);font-size:0.95em;">${title}</strong>`;
        html += `</div>`;
      }
      if (take) {
        html += `<p style="color:var(--text-secondary);font-size:0.88em;margin:0 0 6px;line-height:1.55;">${take}</p>`;
      }
      if (watch) {
        html += `<p style="color:var(--text-muted);font-size:0.82em;margin:0;font-style:italic;">Watch: ${watch}</p>`;
      }
      html += `</div>`;
    });
    html += `</div>`;

    // Legacy fallback: pipe-separated summary → bullet list
    const items = summary.split('|').map(t => t.trim()).filter(Boolean);
    if (items.length > 1) {
      const bullets = items.map(item => {
        const colonIdx = item.indexOf(':');
        if (colonIdx > 0 && colonIdx < 40) {
          const label = item.slice(0, colonIdx).trim();
          const rest  = item.slice(colonIdx + 1).trim();
          return `<li style="margin-bottom:6px;"><strong style="color:var(--text-primary)">${label}</strong> — ${rest}</li>`;
        }
        return `<li style="margin-bottom:6px;">${item}</li>`;
      }).join('');
      html += sec('Stories', `<ul style="list-style:none;padding:0;margin:0">${bullets}</ul>`);
    }
  }

  // ── Topic chips ───────────────────────────────────────────────────────────
  if (topics.length) {
    html += `<div style="display:flex;flex-wrap:wrap;gap:6px;padding:4px 0 10px;">`;
    topics.forEach(t => {
      html += `<span style="background:var(--bg-tertiary);color:var(--text-secondary);padding:3px 10px;border-radius:12px;font-size:0.78em;">${t}</span>`;
    });
    html += `</div>`;
  }

  // ── Legacy section fields (kept for backward compat) ─────────────────────
  if (s.story)      html += sec('The Story', `<p>${s.story}</p>`);
  if (s.alsoMoving) html += sec('Also Moving', `<p>${s.alsoMoving}</p>`);
  if (s.lab)        html += sec('The Lab', `<p>${s.lab}</p>`);
  if (s.reflection) html += sec('Worth Sitting With', `<p style="font-style:italic;color:var(--text-secondary);">${s.reflection}</p>`);

  // ── Read full newsletter link ─────────────────────────────────────────────
  if (readLink) {
    html += `<div style="padding:10px 0 4px;">
      <a href="${readLink}" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:6px;color:var(--text-muted);font-weight:500;text-decoration:none;font-size:0.85em;transition:opacity 0.15s;" onmouseover="this.style.opacity='0.8'" onmouseout="this.style.opacity='1'">
        Read full brief <span style="font-size:1.1em;">→</span>
      </a>
    </div>`;
  }

  return html;
}

function mdToHtml(text) {
  // Convert markdown-ish text to safe HTML for display in report sections.
  // Handles: **bold**, bullet lists (- item), newlines, tables (| row |)
  if (!text) return '';
  // Escape HTML
  let s = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  // Bold
  s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // Process line by line
  const lines = s.split('\n');
  let out = '';
  let inUl = false;
  let inTable = false;
  for (let i = 0; i < lines.length; i++) {
    const t = lines[i].trim();
    if (!t) {
      if (inUl) { out += '</ul>'; inUl = false; }
      if (inTable) { out += '</table>'; inTable = false; }
      continue;
    }
    // Markdown table row: | a | b | c |
    if (t.startsWith('|') && t.endsWith('|')) {
      if (!inTable) { out += '<table style="border-collapse:collapse;width:100%;font-size:13px;margin:8px 0;">'; inTable = true; }
      // Skip separator row (|---|---|)
      if (/^\|[\s\-|]+\|$/.test(t)) continue;
      const cells = t.slice(1, -1).split('|').map(c => `<td style="padding:4px 8px;border:1px solid var(--border-color,rgba(255,255,255,0.1));">${c.trim()}</td>`).join('');
      out += `<tr>${cells}</tr>`;
      continue;
    }
    if (inTable) { out += '</table>'; inTable = false; }
    // Bullet list
    if (t.startsWith('- ') || t.startsWith('* ')) {
      if (!inUl) { out += '<ul style="padding-left:18px;margin:6px 0;">'; inUl = true; }
      out += `<li style="margin-bottom:4px;">${t.slice(2)}</li>`;
      continue;
    }
    if (inUl) { out += '</ul>'; inUl = false; }
    // Numbered list
    const num = t.match(/^(\d+)\.\s+(.+)/);
    if (num) { out += `<p style="margin:4px 0;"><strong>${num[1]}.</strong> ${num[2]}</p>`; continue; }
    // Regular paragraph
    out += `<p style="margin:4px 0;">${t}</p>`;
  }
  if (inUl) out += '</ul>';
  if (inTable) out += '</table>';
  return out;
}

function renderGenericSection(key, val) {
  const title = key.replace(/([A-Z])/g, ' $1').replace(/^./, s => s.toUpperCase());
  if (Array.isArray(val)) {
    return sec(title, `<ul>${val.map(v => `<li>${v}</li>`).join('')}</ul>`);
  }
  if (typeof val === 'string') {
    return sec(title, `<p>${val}</p>`);
  }
  if (typeof val === 'object' && val !== null) {
    let inner = '';
    for (const [k, v] of Object.entries(val)) {
      inner += `<div style="margin-bottom:6px;"><strong style="font-size:12px;color:var(--text-muted);text-transform:uppercase;">${k}</strong><div style="font-size:14px;color:var(--text-secondary);">${v}</div></div>`;
    }
    return sec(title, inner);
  }
  return '';
}

function sec(title, content) {
  return `<div class="report-section"><div class="report-section-title">${title}</div>${content}</div>`;
}

function formatDateFull(d) {
  return new Date(d + 'T12:00:00').toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
}
function formatTime(ts) {
  return new Date(ts).toLocaleString('en-US', { timeZone: 'America/Denver', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit', hour12: true });
}
function formatMonthLabel(ym) {
  const [y, m] = ym.split('-');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return months[parseInt(m) - 1] + ' ' + y;
}
function getWeekLabel(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  const day = d.getDate();
  if (day <= 7) return 'Week 1';
  if (day <= 14) return 'Week 2';
  if (day <= 21) return 'Week 3';
  return 'Week 4';
}
function getTypeLabel(type) {
  const map = {
    'morning-report': 'Morning Report',
    'ceo-report': 'CEO Report',
    'agent-reflection': 'Agent Reflection',
    'agent-daily': 'Daily Report',

    'podcast': '🎙️ Podcast',
    'agent-goals': 'Goals & Progress',
    'self-improve-report': '🔧 Self-Improvement',
  };
  return map[type] || type;
}
